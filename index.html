<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#1a3a2e" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>Vakantie Koningslijst</title>

<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="icon-192.png" />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,800&family=Geist:wght@400;500;600;700&display=swap" rel="stylesheet">

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
  :root {
    --bg: #f4f0e8;
    --bg-deep: #ebe5d6;
    --bg-card: #ffffff;
    --ink: #1a2e26;
    --ink-soft: #4a5d54;
    --sun: #e8a838;
    --sun-deep: #c8881a;
    --leaf: #4a7a5c;
    --leaf-deep: #2d5a3f;
    --coral: #d4634a;
    --shadow: rgba(26, 46, 38, 0.08);
    --shadow-strong: rgba(26, 46, 38, 0.18);
    --border-soft: rgba(26, 46, 38, 0.08);
    --border-mid: rgba(26, 46, 38, 0.15);
  }

  body.dark {
    --bg: #14201b;
    --bg-deep: #1d2a24;
    --bg-card: #243029;
    --ink: #e8ddc4;
    --ink-soft: #9aa89e;
    --sun: #e8a838;
    --sun-deep: #f0b84a;
    --leaf: #6aa080;
    --leaf-deep: #88c4a0;
    --coral: #e88673;
    --shadow: rgba(0, 0, 0, 0.3);
    --shadow-strong: rgba(0, 0, 0, 0.5);
    --border-soft: rgba(232, 221, 196, 0.08);
    --border-mid: rgba(232, 221, 196, 0.18);
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Geist', -apple-system, sans-serif;
    overscroll-behavior-y: none;
    -webkit-font-smoothing: antialiased;
  }

  body {
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
    min-height: 100vh;
    background:
      radial-gradient(circle at 10% 0%, rgba(232, 168, 56, 0.12) 0%, transparent 40%),
      radial-gradient(circle at 90% 100%, rgba(74, 122, 92, 0.1) 0%, transparent 40%),
      var(--bg);
  }

  #root { min-height: 100vh; }

  .app {
    max-width: 720px;
    margin: 0 auto;
    padding: 16px 12px 100px;
  }

  /* Header */
  .header {
    text-align: center;
    margin: 8px 0 16px;
    position: relative;
  }

  .header h1 {
    font-family: 'Fraunces', serif;
    font-weight: 800;
    font-size: 32px;
    margin: 0;
    line-height: 1;
    letter-spacing: -0.02em;
    color: var(--ink);
  }

  .header h1 .ampersand {
    font-style: italic;
    font-weight: 400;
    color: var(--sun-deep);
  }

  .header .subtitle {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    color: var(--ink-soft);
    margin-top: 6px;
  }

  /* Sync status */
  .sync-status {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px;
    border-radius: 99px;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-top: 8px;
    transition: all 0.3s;
  }

  .sync-status.synced {
    background: rgba(74, 122, 92, 0.15);
    color: var(--leaf-deep);
  }

  .sync-status.syncing {
    background: rgba(232, 168, 56, 0.15);
    color: var(--sun-deep);
  }

  .sync-status.offline {
    background: rgba(212, 99, 74, 0.15);
    color: var(--coral);
  }

  .sync-status.local {
    background: rgba(26, 46, 38, 0.08);
    color: var(--ink-soft);
  }

  .sync-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: currentColor;
  }

  .sync-status.syncing .sync-dot {
    animation: pulse 1s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* Progress */
  .progress-card {
    background: var(--ink);
    color: var(--bg);
    border-radius: 20px;
    padding: 18px 20px;
    margin-bottom: 20px;
    box-shadow: 0 8px 24px var(--shadow-strong);
    position: sticky;
    top: 8px;
    z-index: 10;
  }

  .progress-top {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 12px;
  }

  .progress-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    opacity: 0.7;
  }

  .progress-count {
    font-family: 'Fraunces', serif;
    font-size: 22px;
    font-weight: 600;
  }

  .progress-count .total {
    opacity: 0.5;
    font-size: 14px;
  }

  .progress-bar {
    height: 8px;
    background: rgba(244, 240, 232, 0.15);
    border-radius: 99px;
    overflow: hidden;
    position: relative;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--sun) 0%, var(--coral) 100%);
    border-radius: 99px;
    transition: width 0.4s cubic-bezier(0.34, 1.2, 0.64, 1);
    box-shadow: 0 0 12px rgba(232, 168, 56, 0.5);
  }

  .progress-percent {
    text-align: right;
    font-size: 10px;
    opacity: 0.6;
    margin-top: 6px;
    letter-spacing: 0.1em;
  }

  /* Category */
  .category {
    margin-bottom: 24px;
  }

  .category-title {
    font-family: 'Fraunces', serif;
    font-size: 20px;
    font-weight: 600;
    margin: 0 0 12px 4px;
    display: flex;
    align-items: center;
    gap: 10px;
    color: var(--ink);
  }

  .category-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, var(--ink-soft) 0%, transparent 100%);
    opacity: 0.3;
  }

  .category-icon {
    font-size: 22px;
  }

  /* Grid */
  .grid {
    display: grid;
    grid-template-columns: repeat(var(--cols, 4), 1fr);
    gap: 8px;
  }

  @media (max-width: 380px) {
    .grid { gap: 6px; }
  }

  /* Bij meer kolommen, kleinere fonts en padding */
  .app[data-cols="6"] .item-label,
  .app[data-cols="7"] .item-label,
  .app[data-cols="8"] .item-label { font-size: 9px; }

  .app[data-cols="6"] .item-icon { font-size: 20px; }
  .app[data-cols="7"] .item-icon { font-size: 18px; }
  .app[data-cols="8"] .item-icon { font-size: 16px; }

  .app[data-cols="3"] .item-icon { font-size: 28px; }
  .app[data-cols="3"] .item-label { font-size: 12px; }

  /* Item card */
  .item {
    aspect-ratio: 1;
    border-radius: 14px;
    background: var(--bg-card);
    border: 1.5px solid rgba(26, 46, 38, 0.08);
    padding: 6px 4px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    cursor: pointer;
    transition: all 0.25s cubic-bezier(0.34, 1.2, 0.64, 1);
    position: relative;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
  }

  .item:active {
    transform: scale(0.94);
  }

  .item-icon {
    font-size: 24px;
    line-height: 1;
    transition: transform 0.3s ease;
  }

  .item-label {
    font-size: 10px;
    text-align: center;
    line-height: 1.15;
    font-weight: 500;
    color: var(--ink);
    word-break: break-word;
    hyphens: auto;
    padding: 0 2px;
  }

  .item.ready {
    background: linear-gradient(135deg, var(--sun) 0%, #f0b84a 100%);
    border-color: var(--sun-deep);
    box-shadow: 0 4px 12px rgba(232, 168, 56, 0.35);
    animation: readyPulse 0.4s cubic-bezier(0.34, 1.6, 0.64, 1);
  }

  .item.ready .item-label {
    color: #5a3a0a;
    font-weight: 600;
  }

  .item.ready .item-icon {
    transform: scale(1.1);
  }

  @keyframes readyPulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.08); }
    100% { transform: scale(1); }
  }

  .item.packed {
    background: var(--bg-deep);
    border-color: rgba(26, 46, 38, 0.1);
    border-style: dashed;
    opacity: 0.65;
  }

  .item.packed .item-icon,
  .item.packed .item-label {
    filter: blur(1.5px);
    opacity: 0.7;
  }

  .item.packed::after {
    content: '✓';
    position: absolute;
    top: 4px;
    right: 6px;
    font-size: 11px;
    font-weight: 700;
    color: var(--leaf-deep);
    background: rgba(244, 240, 232, 0.9);
    width: 16px;
    height: 16px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    filter: none;
    opacity: 1;
  }

  /* Glow effect bij wijzigingen */
  .item.glowing {
    animation: glowPulse 1.2s cubic-bezier(0.34, 1.4, 0.64, 1);
    z-index: 5;
  }

  @keyframes glowPulse {
    0% {
      box-shadow:
        0 0 0 0 rgba(74, 122, 92, 0.7),
        0 0 20px 4px rgba(74, 122, 92, 0.4);
      transform: scale(1);
    }
    30% {
      box-shadow:
        0 0 0 8px rgba(74, 122, 92, 0),
        0 0 30px 8px rgba(74, 122, 92, 0.6);
      transform: scale(1.05);
    }
    100% {
      box-shadow:
        0 0 0 12px rgba(74, 122, 92, 0),
        0 0 0 0 rgba(74, 122, 92, 0);
      transform: scale(1);
    }
  }

  /* Add button */
  .add-button {
    width: 100%;
    margin-top: 6px;
    padding: 10px;
    background: transparent;
    border: 1.5px dashed rgba(26, 46, 38, 0.25);
    border-radius: 12px;
    color: var(--ink-soft);
    font-family: 'Geist', sans-serif;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.05em;
  }

  /* Packed section */
  .packed-section {
    margin-top: 32px;
    padding-top: 20px;
    border-top: 2px dashed rgba(26, 46, 38, 0.15);
  }

  .packed-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
    padding: 0 4px;
  }

  .packed-header h2 {
    font-family: 'Fraunces', serif;
    font-size: 18px;
    font-weight: 600;
    margin: 0;
    color: var(--leaf-deep);
  }

  .packed-count {
    background: var(--leaf);
    color: var(--bg);
    font-size: 11px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 99px;
    letter-spacing: 0.05em;
  }

  /* Modal */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(26, 46, 38, 0.5);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    z-index: 100;
    animation: fadeIn 0.2s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .modal {
    background: var(--bg);
    border-radius: 20px;
    padding: 24px;
    max-width: 380px;
    width: 100%;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    animation: modalIn 0.3s cubic-bezier(0.34, 1.4, 0.64, 1);
    max-height: 90vh;
    overflow-y: auto;
  }

  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.9) translateY(20px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }

  .modal h3 {
    font-family: 'Fraunces', serif;
    font-size: 22px;
    margin: 0 0 8px;
    color: var(--ink);
  }

  .modal p {
    font-size: 14px;
    color: var(--ink-soft);
    margin: 0 0 20px;
    line-height: 1.5;
  }

  .modal-buttons {
    display: flex;
    gap: 10px;
  }

  .btn {
    flex: 1;
    padding: 12px 16px;
    border-radius: 12px;
    font-family: 'Geist', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: transform 0.15s, background 0.2s;
    letter-spacing: 0.02em;
  }

  .btn:active { transform: scale(0.96); }

  .btn-primary {
    background: var(--ink);
    color: var(--bg);
  }

  .btn-secondary {
    background: rgba(26, 46, 38, 0.08);
    color: var(--ink);
  }

  .btn-danger {
    background: var(--coral);
    color: white;
  }

  .input-group {
    margin-bottom: 14px;
  }

  .input-group label {
    display: block;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--ink-soft);
    margin-bottom: 6px;
  }

  .input-group input,
  .input-group select {
    width: 100%;
    padding: 12px 14px;
    border: 1.5px solid rgba(26, 46, 38, 0.15);
    border-radius: 10px;
    font-family: 'Geist', sans-serif;
    font-size: 15px;
    background: var(--bg-card);
    color: var(--ink);
  }

  .input-group input:focus,
  .input-group select:focus {
    outline: none;
    border-color: var(--leaf);
  }

  /* Toolbar */
  .toolbar {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }

  .tool-btn {
    flex: 1;
    min-width: 0;
    padding: 10px 12px;
    background: var(--bg-card);
    border: 1.5px solid rgba(26, 46, 38, 0.1);
    border-radius: 12px;
    font-family: 'Geist', sans-serif;
    font-size: 12px;
    font-weight: 500;
    color: var(--ink);
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }

  .tool-btn:active {
    transform: scale(0.97);
    background: var(--bg-deep);
  }

  /* Empty state */
  .empty {
    text-align: center;
    padding: 30px 20px;
    color: var(--ink-soft);
    font-size: 13px;
    font-style: italic;
    font-family: 'Fraunces', serif;
  }

  /* Celebration */
  .celebrate {
    text-align: center;
    padding: 40px 20px;
    background: linear-gradient(135deg, var(--leaf) 0%, var(--leaf-deep) 100%);
    border-radius: 20px;
    color: var(--bg);
    margin: 20px 0;
    animation: modalIn 0.5s cubic-bezier(0.34, 1.4, 0.64, 1);
  }

  .celebrate h2 {
    font-family: 'Fraunces', serif;
    font-size: 28px;
    margin: 0 0 6px;
    font-weight: 800;
  }

  .celebrate p {
    margin: 0;
    opacity: 0.85;
    font-size: 14px;
  }

  .celebrate-emoji {
    font-size: 56px;
    display: block;
    margin-bottom: 8px;
    animation: bounce 1.5s infinite;
  }

  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }

  /* Account avatar op item */
  .item-account-badge {
    position: absolute;
    top: 3px;
    right: 3px;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 9px;
    font-weight: 700;
    color: white;
    text-transform: uppercase;
    border: 1.5px solid var(--bg-card);
    z-index: 1;
  }

  /* Aantal-badge linksonder op item */
  .item-quantity-badge {
    position: absolute;
    bottom: 3px;
    left: 3px;
    background: var(--ink);
    color: var(--bg);
    font-size: 9px;
    font-weight: 700;
    padding: 1px 5px;
    border-radius: 99px;
    line-height: 1.2;
    min-width: 14px;
    text-align: center;
  }

  /* Privé-badge */
  .item-private-badge {
    position: absolute;
    top: 3px;
    left: 3px;
    width: 14px;
    height: 14px;
    background: var(--coral);
    color: white;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 9px;
    font-weight: 700;
  }

  /* Vertrek aftelling */
  .countdown-card {
    background: linear-gradient(135deg, var(--coral) 0%, #e8865c 100%);
    color: white;
    border-radius: 16px;
    padding: 10px 16px;
    margin-bottom: 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-shadow: 0 4px 12px rgba(212, 99, 74, 0.3);
  }

  .countdown-card .label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    opacity: 0.9;
  }

  .countdown-card .value {
    font-family: 'Fraunces', serif;
    font-size: 22px;
    font-weight: 700;
  }

  .countdown-card .edit-btn {
    background: rgba(255, 255, 255, 0.2);
    border: none;
    color: white;
    padding: 5px 9px;
    border-radius: 8px;
    font-size: 11px;
    cursor: pointer;
  }

  /* Zoekbalk */
  .search-bar {
    position: relative;
    margin-bottom: 14px;
  }

  .search-bar input {
    width: 100%;
    padding: 11px 38px 11px 40px;
    border: 1.5px solid var(--border-mid);
    border-radius: 12px;
    font-family: 'Geist', sans-serif;
    font-size: 14px;
    background: var(--bg-card);
    color: var(--ink);
  }

  .search-bar input:focus {
    outline: none;
    border-color: var(--leaf);
  }

  .search-bar::before {
    content: '🔍';
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 14px;
    opacity: 0.6;
  }

  .search-clear {
    position: absolute;
    right: 8px;
    top: 50%;
    transform: translateY(-50%);
    background: var(--ink-soft);
    color: var(--bg);
    border: none;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    font-size: 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
    padding: 0;
  }

  /* Categorie collapse */
  .category-title {
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
  }

  .category-chevron {
    font-size: 14px;
    color: var(--ink-soft);
    margin-left: auto;
    padding-left: 8px;
    transition: transform 0.25s ease;
  }

  .category.collapsed .category-chevron {
    transform: rotate(-90deg);
  }

  .category.collapsed::after {
    content: attr(data-count);
    display: block;
    text-align: center;
    color: var(--ink-soft);
    font-size: 11px;
    font-style: italic;
    margin-top: -4px;
    font-family: 'Fraunces', serif;
  }

  /* Snelle add knop per categorie */
  .category-add {
    aspect-ratio: 1;
    border-radius: 14px;
    background: transparent;
    border: 1.5px dashed var(--border-mid);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: var(--ink-soft);
    font-size: 24px;
    transition: all 0.2s;
    user-select: none;
    -webkit-user-select: none;
  }

  .category-add:active {
    transform: scale(0.94);
    background: var(--bg-deep);
  }

  /* Account picker (welkomstscherm) */
  .account-picker {
    max-width: 480px;
    margin: 0 auto;
    padding: 40px 24px 60px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .picker-title {
    font-family: 'Fraunces', serif;
    font-size: 38px;
    font-weight: 800;
    text-align: center;
    margin: 0 0 32px;
    color: var(--ink);
    line-height: 1.1;
    letter-spacing: -0.02em;
  }

  .picker-title-accent {
    font-style: italic;
    font-weight: 400;
    color: var(--sun-deep);
  }

  .picker-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 14px;
  }

  .picker-card {
    background: var(--bg-card);
    border: 2.5px solid var(--card-color, var(--ink));
    border-radius: 18px;
    padding: 22px 12px;
    cursor: pointer;
    transition: all 0.25s cubic-bezier(0.34, 1.4, 0.64, 1);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    font-family: 'Geist', sans-serif;
    box-shadow: 0 4px 0 0 var(--card-color, var(--ink));
    position: relative;
  }

  .picker-card:nth-child(odd) { transform: rotate(-1deg); }
  .picker-card:nth-child(even) { transform: rotate(1deg); }

// Simpele Levenshtein distance voor fuzzy zoeken
function levenshtein(a, b) {
  if (a === b) return 0;
  const al = a.length, bl = b.length;
  if (al === 0) return bl;
  if (bl === 0) return al;
  const v0 = new Array(bl + 1);
  const v1 = new Array(bl + 1);
  for (let i = 0; i <= bl; i++) v0[i] = i;
  for (let i = 0; i < al; i++) {
    v1[0] = i + 1;
    for (let j = 0; j < bl; j++) {
      const cost = a[i] === b[j] ? 0 : 1;
      v1[j + 1] = Math.min(v1[j] + 1, v0[j + 1] + 1, v0[j] + cost);
    }
    for (let j = 0; j <= bl; j++) v0[j] = v1[j];
  }
  return v1[bl];
}

// Zoek emoji voor een item-naam via woordenboek
function suggestEmoji(name) {
  if (!name) return '📦';
  const lower = name.toLowerCase().trim();
  // Exacte match
  if (EMOJI_DICT[lower]) return EMOJI_DICT[lower];
  // Substring match: kijk of een woord uit de naam in het woordenboek staat
  const words = lower.split(/[\s\-/]+/).filter((w) => w.length > 2);
  for (const w of words) {
    if (EMOJI_DICT[w]) return EMOJI_DICT[w];
  }
  // Fuzzy match op woordenboek
  let best = null, bestDist = 99;
  for (const key of Object.keys(EMOJI_DICT)) {
    if (Math.abs(key.length - lower.length) > 3) continue;
    const d = levenshtein(lower, key);
    if (d < bestDist && d <= 2) {
      bestDist = d;
      best = EMOJI_DICT[key];
    }
  }
  return best || '📦';
}

  };
}

// Device-lokale settings (account-ID, dark mode, kolommen, geluid)
function loadDeviceSettings() {
  try {
    const raw = localStorage.getItem(DEVICE_KEY);
    if (raw) return JSON.parse(raw);
  } catch (e) {}
  return {
    accountId: null,
    darkMode: false,
    columns: 4,
    soundEnabled: true,
    collapsedCategories: [],
  };
}

function saveDeviceSettings(settings) {
  try { localStorage.setItem(DEVICE_KEY, JSON.stringify(settings)); } catch (e) {}
}

// Privé items per account (lokaal opgeslagen, niet gedeeld)
function loadPrivateItems(accountId) {
  if (!accountId) return { items: [], states: {}, quantities: {} };
  try {
    const raw = localStorage.getItem(PRIVATE_KEY_PREFIX + accountId);
    if (raw) return JSON.parse(raw);
  } catch (e) {}
  return { items: [], states: {}, quantities: {} };
}

function savePrivateItems(accountId, data) {
  if (!accountId) return;
  try { localStorage.setItem(PRIVATE_KEY_PREFIX + accountId, JSON.stringify(data)); } catch (e) {}
}

// JSONBin helpers
async function fetchRemote() {
  const res = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}/latest`, {
    headers: {
      'X-Master-Key': JSONBIN_API_KEY,
      'X-Bin-Meta': 'false',
    },
  });
  if (!res.ok) throw new Error('Fetch failed: ' + res.status);
  return await res.json();
}

async function pushRemote(data) {
  const res = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}`, {
    method: 'PUT',
    headers: {
      'Content-Type': 'application/json',
      'X-Master-Key': JSONBIN_API_KEY,
    },
    body: JSON.stringify(data),
  });
  if (!res.ok) throw new Error('Push failed: ' + res.status);
  return await res.json();
}

function App() {
  const [data, setData] = useState(buildDefaultState());
  const [loaded, setLoaded] = useState(false);
  const [syncStatus, setSyncStatus] = useState('local');
  const [glowingIds, setGlowingIds] = useState(new Set());
  const [packingIds, setPackingIds] = useState(new Set());
  const [confirmUnpack, setConfirmUnpack] = useState(null);
  const [showAdd, setShowAdd] = useState(false);
  const [addPrefillCat, setAddPrefillCat] = useState(null);
  const [confirmReset, setConfirmReset] = useState(false);
  const [confirmDelete, setConfirmDelete] = useState(null);
  const [editingItem, setEditingItem] = useState(null);
  const [showConfetti, setShowConfetti] = useState(false);
  const [search, setSearch] = useState('');
  const [showSettings, setShowSettings] = useState(false);
  const [showAccountSwitch, setShowAccountSwitch] = useState(false);
  const [device, setDevice] = useState(() => loadDeviceSettings());
  const [privateData, setPrivateData] = useState({ items: [], states: {}, quantities: {} });
  const longPressTimerRef = useRef(null);
  const longPressFiredRef = useRef(false);
  const lastSyncedRef = useRef(0);
  const pushTimerRef = useRef(null);
  const isPushingRef = useRef(false);
  const dataRef = useRef(data);
  const audioCtxRef = useRef(null);

  useEffect(() => { dataRef.current = data; }, [data]);

  // Dark mode toepassen op body
  useEffect(() => {
    if (device.darkMode) {
      document.body.classList.add('dark');
    } else {
      document.body.classList.remove('dark');
    }
  }, [device.darkMode]);

  // Device settings opslaan bij elke wijziging
  const updateDevice = useCallback((updates) => {
    setDevice((prev) => {
      const next = typeof updates === 'function' ? updates(prev) : { ...prev, ...updates };
      saveDeviceSettings(next);
      return next;
    });
  }, []);

  // Privé items laden zodra account bekend is
  useEffect(() => {
    if (device.accountId) {
      setPrivateData(loadPrivateItems(device.accountId));
    } else {
      setPrivateData({ items: [], states: {}, quantities: {} });
    }
  }, [device.accountId]);

  // Privé items opslaan
  const updatePrivateData = useCallback((updater) => {
    setPrivateData((prev) => {
      const next = typeof updater === 'function' ? updater(prev) : updater;
      savePrivateItems(device.accountId, next);
      return next;
    });
  }, [device.accountId]);

  // Geluidje afspelen (klikje of plop)
  const playSound = useCallback((type) => {
    if (!device.soundEnabled) return;
    try {
      if (!audioCtxRef.current) {
        audioCtxRef.current = new (window.AudioContext || window.webkitAudioContext)();
      }
      const ctx = audioCtxRef.current;
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      if (type === 'ready') {
        osc.frequency.value = 660;
        osc.type = 'sine';
        gain.gain.setValueAtTime(0.15, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.12);
        osc.start();
        osc.stop(ctx.currentTime + 0.12);
      } else if (type === 'pack') {
        // Plop: snelle dalende toon
        osc.frequency.setValueAtTime(880, ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(220, ctx.currentTime + 0.18);
        osc.type = 'triangle';
        gain.gain.setValueAtTime(0.2, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.2);
        osc.start();
        osc.stop(ctx.currentTime + 0.2);
      } else if (type === 'unpack') {
        osc.frequency.setValueAtTime(440, ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(660, ctx.currentTime + 0.15);
        osc.type = 'sine';
        gain.gain.setValueAtTime(0.12, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.18);
        osc.start();
        osc.stop(ctx.currentTime + 0.18);
      }
    } catch (e) {}
  }, [device.soundEnabled]);

  // Eerste keer: laad uit localStorage en daarna uit remote
  useEffect(() => {
    let initial = buildDefaultState();
    try {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) {
        const parsed = JSON.parse(saved);
        if (parsed && parsed.items && parsed.items.length > 0) {
          initial = migrateData(parsed);
        }
      }
    } catch (e) {}
    setData(initial);
    setLoaded(true);

    if (!isSyncConfigured) {
      setSyncStatus('local');
      return;
    }

    // Initiële remote fetch
    (async () => {
      setSyncStatus('syncing');
      try {
        const remote = await fetchRemote();
        const record = remote.record ? migrateData(remote.record) : null;
        // Als remote leeg is (eerste keer), push de huidige state
        if (!record || !record.items || record.items.length === 0) {
          await pushRemote(initial);
          lastSyncedRef.current = initial.lastUpdated;
        } else {
          // Gebruik remote als die nieuwer is
          if ((record.lastUpdated || 0) > (initial.lastUpdated || 0)) {
            setData(record);
            try { localStorage.setItem(STORAGE_KEY, JSON.stringify(record)); } catch (e) {}
            lastSyncedRef.current = record.lastUpdated || Date.now();
          } else if ((initial.lastUpdated || 0) > (record.lastUpdated || 0)) {
            // Lokaal is nieuwer, push naar remote
            await pushRemote(initial);
            lastSyncedRef.current = initial.lastUpdated;
          } else {
            lastSyncedRef.current = record.lastUpdated || Date.now();
          }
        }
        setSyncStatus('synced');
      } catch (e) {
        console.warn('Initial sync failed:', e);
        setSyncStatus('offline');
      }
    })();
  }, []);

  // Polling voor remote wijzigingen, met visibility-aware interval en glow-detectie
  useEffect(() => {
    if (!loaded || !isSyncConfigured) return;

    const poll = async () => {
      if (isPushingRef.current) return;
      try {
        const remote = await fetchRemote();
        const record = remote.record ? migrateData(remote.record) : null;
        if (record && record.lastUpdated && record.lastUpdated > lastSyncedRef.current) {
          // Alleen overschrijven als remote nieuwer is dan onze laatste known sync
          // en de huidige data niet nieuwer is (om eigen wijzigingen niet te overschrijven)
          if (record.lastUpdated > (dataRef.current.lastUpdated || 0)) {
            // Detecteer welke items veranderd zijn voor glow-effect
            const oldStates = dataRef.current.states || {};
            const newStates = record.states || {};
            const oldItemIds = new Set((dataRef.current.items || []).map((it) => it.id));
            const newItemIds = new Set((record.items || []).map((it) => it.id));

            const changedIds = [];
            const newlyPackedIds = [];

            // States veranderd
            const allIds = new Set([...Object.keys(oldStates), ...Object.keys(newStates), ...oldItemIds, ...newItemIds]);
            allIds.forEach((id) => {
              const before = oldStates[id] || 'open';
              const after = newStates[id] || 'open';
              if (before !== after) {
                changedIds.push(id);
                if (after === 'packed') newlyPackedIds.push(id);
              }
            });

            // Nieuwe items toegevoegd door iemand anders
            newItemIds.forEach((id) => {
              if (!oldItemIds.has(id)) changedIds.push(id);
            });

            setData(record);
            try { localStorage.setItem(STORAGE_KEY, JSON.stringify(record)); } catch (e) {}

            if (changedIds.length > 0) {
              triggerGlow(changedIds);
              if (navigator.vibrate && newlyPackedIds.length > 0) navigator.vibrate(20);
            }
          }
          lastSyncedRef.current = record.lastUpdated;
        }
        setSyncStatus((s) => s === 'syncing' ? s : 'synced');
      } catch (e) {
        setSyncStatus('offline');
      }
    };

    // Polling met visibility-aware interval (0 = uit)
    let intervalId = null;
    const startPolling = (ms) => {
      if (intervalId) {
        clearInterval(intervalId);
        intervalId = null;
      }
      if (ms > 0) {
        intervalId = setInterval(poll, ms);
      }
    };
    startPolling(document.hidden ? SYNC_INTERVAL_BACKGROUND_MS : SYNC_INTERVAL_ACTIVE_MS);

    // Verbeterpunt 1: direct synchen bij terugkomen
    const onVisibilityChange = () => {
      if (!document.hidden) {
        // App komt naar voren, doe meteen een sync
        poll();
        startPolling(SYNC_INTERVAL_ACTIVE_MS);
      } else {
        // App gaat naar achtergrond, stop polling
        startPolling(SYNC_INTERVAL_BACKGROUND_MS);
      }
    };

    // Pageshow vangt PWA-resume op iOS na geheugen-vries
    const onPageShow = (e) => {
      if (e.persisted || !document.hidden) {
        poll();
      }
    };

    // Online event, sync zodra verbinding terug is
    const onOnline = () => {
      poll();
    };

    document.addEventListener('visibilitychange', onVisibilityChange);
    window.addEventListener('pageshow', onPageShow);
    window.addEventListener('focus', onVisibilityChange);
    window.addEventListener('online', onOnline);

    return () => {
      if (intervalId) clearInterval(intervalId);
      document.removeEventListener('visibilitychange', onVisibilityChange);
      window.removeEventListener('pageshow', onPageShow);
      window.removeEventListener('focus', onVisibilityChange);
      window.removeEventListener('online', onOnline);
    };
  }, [loaded]);

  // Glow-helper: zet ids in een Set, ruim na 1.2s op
  const triggerGlow = useCallback((ids) => {
    setGlowingIds((prev) => {
      const next = new Set(prev);
      ids.forEach((id) => next.add(id));
      return next;
    });
    ids.forEach((id) => {
      setTimeout(() => {
        setGlowingIds((prev) => {
          if (!prev.has(id)) return prev;
          const next = new Set(prev);
          next.delete(id);
          return next;
        });
      }, 1200);
    });
  }, []);

  // Update data + queue push naar remote
  const updateData = useCallback((updater) => {
    setData((prev) => {
      const next = typeof updater === 'function' ? updater(prev) : updater;
      const stamped = { ...next, lastUpdated: Date.now() };

      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(stamped)); } catch (e) {}

      if (isSyncConfigured) {
        setSyncStatus('syncing');
        if (pushTimerRef.current) clearTimeout(pushTimerRef.current);
        pushTimerRef.current = setTimeout(async () => {
          isPushingRef.current = true;
          try {
            await pushRemote(stamped);
            lastSyncedRef.current = stamped.lastUpdated;
            setSyncStatus('synced');
          } catch (e) {
            console.warn('Push failed:', e);
            setSyncStatus('offline');
          } finally {
            isPushingRef.current = false;
          }
        }, SYNC_DEBOUNCE_MS);
      }

      return stamped;
    });
  }, []);

  const handleTouchStart = (e, item) => {
    longPressFiredRef.current = false;
    if (longPressTimerRef.current) clearTimeout(longPressTimerRef.current);
    longPressTimerRef.current = setTimeout(() => {
      longPressFiredRef.current = true;
      if (navigator.vibrate) navigator.vibrate(40);
      setEditingItem(item);
    }, 500);
  };

  const handleTouchEnd = () => {
    if (longPressTimerRef.current) {
      clearTimeout(longPressTimerRef.current);
      longPressTimerRef.current = null;
    }
  };

  // Helper: is item privé?
  const isPrivateItem = (id) => privateData.items.some((it) => it.id === id);

  // Helper: huidige state voor een item, kijkt in juiste lijst
  const getItemState = (id) => {
    if (isPrivateItem(id)) return privateData.states[id] || 'open';
    return data.states[id] || 'open';
  };

  // Helper: update een state voor item (privé of gedeeld)
  const setItemState = (id, newState) => {
    if (isPrivateItem(id)) {
      updatePrivateData((prev) => ({ ...prev, states: { ...prev.states, [id]: newState } }));
    } else {
      updateData((prev) => {
        const newPackedBy = { ...prev.packedBy };
        if (newState === 'packed') {
          newPackedBy[id] = device.accountId || 'unknown';
        } else {
          delete newPackedBy[id];
        }
        return { ...prev, states: { ...prev.states, [id]: newState }, packedBy: newPackedBy };
      });
    }
  };

  const handleClick = (id) => {
    // Onderdruk click als long-press net gefired heeft
    if (longPressFiredRef.current) {
      longPressFiredRef.current = false;
      return;
    }
    const current = getItemState(id);
    let next;
    if (current === 'open') {
      next = 'ready';
      if (navigator.vibrate) navigator.vibrate(10);
      playSound('ready');
    } else if (current === 'ready') {
      next = 'packed';
      if (navigator.vibrate) navigator.vibrate([10, 30, 20]);
      playSound('pack');
      triggerGlow([id]);
      // Krimp-animatie
      setPackingIds((prev) => new Set([...prev, id]));
      setTimeout(() => {
        setPackingIds((prev) => {
          const n = new Set(prev);
          n.delete(id);
          return n;
        });
      }, 500);
    } else {
      setConfirmUnpack(id);
      return;
    }
    setItemState(id, next);
  };

  const confirmUnpackYes = () => {
    playSound('unpack');
    setItemState(confirmUnpack, 'open');
    setConfirmUnpack(null);
  };

  const addCustomItem = (name, category, emoji, isPrivate) => {
    const newItem = {
      id: (isPrivate ? 'p' : 'c') + Date.now(),
      n: capitalize(name),
      c: category,
      e: emoji || suggestEmoji(name) || '📦',
    };
    if (isPrivate) {
      updatePrivateData((prev) => ({ ...prev, items: [...prev.items, newItem] }));
    } else {
      updateData((prev) => ({ ...prev, items: [...prev.items, newItem] }));
    }
    setShowAdd(false);
    setAddPrefillCat(null);
  };

  const deleteCustom = (id) => {
    if (isPrivateItem(id)) {
      updatePrivateData((prev) => {
        const newStates = { ...prev.states };
        const newQ = { ...prev.quantities };
        delete newStates[id];
        delete newQ[id];
        return { items: prev.items.filter((it) => it.id !== id), states: newStates, quantities: newQ };
      });
    } else {
      updateData((prev) => {
        const newStates = { ...prev.states };
        const newQ = { ...prev.quantities };
        const newPackedBy = { ...prev.packedBy };
        delete newStates[id];
        delete newQ[id];
        delete newPackedBy[id];
        return { ...prev, items: prev.items.filter((it) => it.id !== id), states: newStates, quantities: newQ, packedBy: newPackedBy };
      });
    }
    setConfirmDelete(null);
  };

  // Pas een item aan
  const updateItem = (id, updates) => {
    if (updates.n) updates.n = capitalize(updates.n);
    if (isPrivateItem(id)) {
      updatePrivateData((prev) => ({
        ...prev,
        items: prev.items.map((it) => (it.id === id ? { ...it, ...updates } : it)),
        quantities: updates.quantity !== undefined
          ? { ...prev.quantities, [id]: updates.quantity }
          : prev.quantities,
      }));
    } else {
      updateData((prev) => ({
        ...prev,
        items: prev.items.map((it) => (it.id === id ? { ...it, ...updates } : it)),
        quantities: updates.quantity !== undefined
          ? { ...prev.quantities, [id]: updates.quantity }
          : prev.quantities,
      }));
    }
    setEditingItem(null);
  };

  // Verwijder een item
  const deleteAnyItem = (id) => {
    deleteCustom(id);
    setEditingItem(null);
  };

  const resetAll = () => {
    updateData((prev) => ({ ...prev, states: {}, packedBy: {} }));
    if (device.accountId) {
      updatePrivateData((prev) => ({ ...prev, states: {} }));
    }
    setConfirmReset(false);
  };

  const grouped = useMemo(() => {
    // Combineer gedeelde en privé items
    const allItems = [...data.items, ...privateData.items];
    const allStates = { ...data.states };
    privateData.items.forEach((it) => {
      if (privateData.states[it.id]) allStates[it.id] = privateData.states[it.id];
    });

    // Filter op zoekterm met fuzzy matching
    const q = search.trim().toLowerCase();
    let visibleItems = allItems;
    if (q.length > 0) {
      visibleItems = allItems.filter((it) => {
        const name = it.n.toLowerCase();
        if (name.includes(q)) return true;
        // Fuzzy: kijk per woord in naam
        const words = name.split(/\s+/);
        for (const w of words) {
          if (w.startsWith(q)) return true;
          // Levenshtein op woorden van vergelijkbare lengte
          if (Math.abs(w.length - q.length) <= 2) {
            const d = levenshtein(w, q);
            if (d <= Math.max(1, Math.floor(q.length / 4))) return true;
          }
        }
        // Hele naam fuzzy match
        if (Math.abs(name.length - q.length) <= 3) {
          const d = levenshtein(name, q);
          if (d <= Math.max(1, Math.floor(q.length / 3))) return true;
        }
        return false;
      });
    }

    const open = visibleItems.filter((it) => (allStates[it.id] || 'open') !== 'packed');
    const packed = visibleItems.filter((it) => allStates[it.id] === 'packed');

    const byCategory = {};
    open.forEach((it) => {
      if (!byCategory[it.c]) byCategory[it.c] = [];
      byCategory[it.c].push(it);
    });
    Object.keys(byCategory).forEach((c) => {
      byCategory[c].sort((a, b) => a.n.localeCompare(b.n, 'nl'));
    });

    const catOrder = ['Reisdocumenten', 'Verzorging', 'Kleding', 'Handbagage', 'Eigen items', 'Overige'];
    const ordered = catOrder.filter((c) => byCategory[c]).map((c) => ({ name: c, items: byCategory[c] }));
    // Onbekende categorieen toevoegen vlak voor Overige
    const extraCats = Object.keys(byCategory).filter((c) => !catOrder.includes(c));
    if (extraCats.length > 0) {
      const overigeIndex = ordered.findIndex((g) => g.name === 'Overige');
      const extras = extraCats.map((c) => ({ name: c, items: byCategory[c] }));
      if (overigeIndex >= 0) {
        ordered.splice(overigeIndex, 0, ...extras);
      } else {
        ordered.push(...extras);
      }
    }

    packed.sort((a, b) => a.n.localeCompare(b.n, 'nl'));
    return { open: ordered, packed, totalPacked: packed.length, allItems, allStates };
  }, [data, privateData, search]);

  const total = grouped.allItems.length;
  const packedCount = grouped.totalPacked;
  // Altijd naar beneden afronden, behalve als echt alles ingepakt is
  const percent = total > 0
    ? (packedCount >= total ? 100 : Math.floor((packedCount / total) * 100))
    : 0;

  // Confetti afspelen wanneer we 100% bereiken
  const prevPercentRef = useRef(null);
  useEffect(() => {
    if (!loaded) return;
    // Eerste keer dat we loaded zijn, alleen huidige waarde onthouden, geen confetti
    if (prevPercentRef.current === null) {
      prevPercentRef.current = percent;
      return;
    }
    if (percent === 100 && prevPercentRef.current < 100) {
      setShowConfetti(true);
      if (navigator.vibrate) navigator.vibrate([50, 50, 50, 50, 200]);
      setTimeout(() => setShowConfetti(false), 5000);
    }
    prevPercentRef.current = percent;
  }, [percent, loaded]);

  const statusText = {
    synced: '✓ Gesynchroniseerd',
    syncing: '↻ Synchroniseren',
    offline: '⚠ Offline',
    local: '💾 Alleen lokaal',
  }[syncStatus];

  // Account picker tonen als geen account is gekozen
  if (!device.accountId) {
    return (
      <AccountPicker
        accounts={data.accounts}
        onPick={(accountId) => updateDevice({ accountId })}
      />
    );
  }

  const currentAccount = data.accounts.find((a) => a.id === device.accountId);
  const collapsedSet = new Set(device.collapsedCategories || []);
  const toggleCategory = (catName) => {
    updateDevice((prev) => {
      const isCollapsed = (prev.collapsedCategories || []).includes(catName);
      return {
        ...prev,
        collapsedCategories: isCollapsed
          ? prev.collapsedCategories.filter((c) => c !== catName)
          : [...(prev.collapsedCategories || []), catName],
      };
    });
  };

  // Vertrek-aftelling berekenen
  const daysUntilDeparture = (() => {
    if (!data.departureDate) return null;
    const today = new Date();
    today.setHours(0, 0, 0, 0);
    const dep = new Date(data.departureDate);
    dep.setHours(0, 0, 0, 0);
    const days = Math.ceil((dep - today) / (1000 * 60 * 60 * 24));
    return days;
  })();

  const accountById = (id) => data.accounts.find((a) => a.id === id);
  const renderItem = (item, inPackedSection) => {
    const state = grouped.allStates[item.id] || 'open';
    const isPrivate = item.id.startsWith('p');
    const quantity = isPrivate
      ? (privateData.quantities[item.id] || 1)
      : (data.quantities[item.id] || 1);
    const packerId = data.packedBy[item.id];
    const packer = packerId ? accountById(packerId) : null;
    return (
      <div
        key={item.id}
        className={`item ${inPackedSection ? 'packed' : state} ${glowingIds.has(item.id) ? 'glowing' : ''} ${packingIds.has(item.id) ? 'packing-animation' : ''}`}
        onClick={() => handleClick(item.id)}
        onContextMenu={(e) => { e.preventDefault(); setEditingItem(item); }}
        onTouchStart={(e) => handleTouchStart(e, item)}
        onTouchEnd={handleTouchEnd}
        onTouchMove={handleTouchEnd}
        onTouchCancel={handleTouchEnd}
      >
        {isPrivate && <span className="item-private-badge">🔒</span>}
        {packer && (
          <span className="item-account-badge" style={{ background: packer.color }} title={packer.name}>
            {packer.name.charAt(0)}
          </span>
        )}
        <span className="item-icon">{item.e}</span>
        <span className="item-label">{item.n}</span>
        {quantity > 1 && <span className="item-quantity-badge">×{quantity}</span>}
      </div>
    );
  };

  return (
    <div className="app" data-cols={device.columns} style={{ '--cols': device.columns }}>
      <div className="header">
        <h1>Vakantie <span className="ampersand">Konings</span>lijst</h1>
        <div className="subtitle">caravan inpakker</div>
        <div className={`sync-status ${syncStatus}`}>
          <span className="sync-dot"></span>
          {statusText}
        </div>
        <div
          className="account-chip"
          onClick={() => setShowSettings(true)}
        >
          <span className="mini-avatar" style={{ background: currentAccount?.color || '#888' }}>
            {currentAccount?.name?.charAt(0) || '?'}
          </span>
          <span>{currentAccount?.name || 'Onbekend'}</span>
        </div>
      </div>

      {daysUntilDeparture !== null && (
        <div className="countdown-card">
          <div>
            <div className="label">{daysUntilDeparture > 0 ? 'Nog te gaan' : daysUntilDeparture === 0 ? 'Vertrek' : 'Vertrokken'}</div>
            <div className="value">
              {daysUntilDeparture > 0
                ? `${daysUntilDeparture} ${daysUntilDeparture === 1 ? 'dag' : 'dagen'}`
                : daysUntilDeparture === 0 ? 'Vandaag!' : 'Geniet ervan!'}
            </div>
          </div>
          <button className="edit-btn" onClick={() => setShowSettings(true)}>✏️</button>
        </div>
      )}

      <div className="progress-card">
        <div className="progress-top">
          <span className="progress-label">Voortgang</span>
          <span className="progress-count">
            {packedCount}<span className="total"> / {total}</span>
          </span>
        </div>
        <div className="progress-bar">
          <div className="progress-fill" style={{ width: percent + '%' }} />
        </div>
        <div className="progress-percent">{percent}% INGEPAKT</div>
      </div>

      <div className="search-bar">
        <input
          type="text"
          value={search}
          onChange={(e) => setSearch(e.target.value)}
          placeholder="Zoek een item..."
        />
        {search && <button className="search-clear" onClick={() => setSearch('')} aria-label="Wis">×</button>}
      </div>

      <div className="toolbar">
        <button className="tool-btn" onClick={() => { setAddPrefillCat(null); setShowAdd(true); }}>＋ Eigen item</button>
        <button className="tool-btn" onClick={() => setShowSettings(true)}>⚙ Instellingen</button>
      </div>

      {percent === 100 && (
        <div className="celebrate">
          <span className="celebrate-emoji">🏕️</span>
          <h2>Klaar voor vertrek!</h2>
          <p>Alles is ingepakt. Veilige reis!</p>
        </div>
      )}

      {grouped.open.map((group) => {
        const isCollapsed = collapsedSet.has(group.name);
        return (
          <div
            key={group.name}
            className={`category ${isCollapsed ? 'collapsed' : ''}`}
            data-count={`${group.items.length} ${group.items.length === 1 ? 'item' : 'items'} verborgen`}
          >
            <h2 className="category-title" onClick={() => toggleCategory(group.name)}>
              <span className="category-icon">{CATEGORY_ICONS[group.name] || '📦'}</span>
              {group.name}
              <span className="category-chevron">▼</span>
            </h2>
            {!isCollapsed && (
              <div className="grid">
                {group.items.map((item) => renderItem(item, false))}
                <button
                  className="category-add"
                  onClick={() => { setAddPrefillCat(group.name); setShowAdd(true); }}
                  aria-label="Item toevoegen aan deze categorie"
                  title={`Item toevoegen aan ${group.name}`}
                >＋</button>
              </div>
            )}
          </div>
        );
      })}

      <div className="packed-section">
        <div className="packed-header">
          <h2>Ingepakte spullen</h2>
          <span className="packed-count">{packedCount}</span>
        </div>
        {grouped.packed.length === 0 ? (
          <div className="empty">{search ? 'Niks gevonden in ingepakt.' : 'Nog niks ingepakt, kom op!'}</div>
        ) : (
          <div className="grid">
            {grouped.packed.map((item) => renderItem(item, true))}
          </div>
        )}
      </div>

      {confirmUnpack && (
        <Modal
          title="Is dit toch niet ingepakt?"
          body="Dan zet ik 'm weer terug op de oorspronkelijke plek."
          onClose={() => setConfirmUnpack(null)}
          buttons={
            <>
              <button className="btn btn-secondary" onClick={() => setConfirmUnpack(null)}>Nee, laat staan</button>
              <button className="btn btn-primary" onClick={confirmUnpackYes}>Ja, terugzetten</button>
            </>
          }
        />
      )}

      {confirmReset && (
        <Modal
          title="Alles resetten?"
          body="Alle items gaan terug naar de oorspronkelijke staat. Eigen toegevoegde items blijven staan. Dit gebeurt op alle telefoons tegelijk."
          onClose={() => setConfirmReset(false)}
          buttons={
            <>
              <button className="btn btn-secondary" onClick={() => setConfirmReset(false)}>Annuleer</button>
              <button className="btn btn-danger" onClick={resetAll}>Ja, reset</button>
            </>
          }
        />
      )}

      {confirmDelete && (
        <Modal
          title="Item verwijderen?"
          body="Dit eigen item wordt permanent uit de lijst gehaald. Ook op andere telefoons."
          onClose={() => setConfirmDelete(null)}
          buttons={
            <>
              <button className="btn btn-secondary" onClick={() => setConfirmDelete(null)}>Annuleer</button>
              <button className="btn btn-danger" onClick={() => deleteCustom(confirmDelete)}>Verwijder</button>
            </>
          }
        />
      )}

      {showAdd && (
        <AddItemModal
          onAdd={addCustomItem}
          onClose={() => { setShowAdd(false); setAddPrefillCat(null); }}
          existingCategories={[...new Set(grouped.allItems.map((it) => it.c))]}
          prefillCategory={addPrefillCat}
          accountName={currentAccount?.name}
        />
      )}

      {editingItem && (
        <EditItemModal
          item={editingItem}
          quantity={
            editingItem.id.startsWith('p')
              ? (privateData.quantities[editingItem.id] || 1)
              : (data.quantities[editingItem.id] || 1)
          }
          onSave={updateItem}
          onDelete={deleteAnyItem}
          onClose={() => setEditingItem(null)}
          existingCategories={[...new Set(grouped.allItems.map((it) => it.c))]}
        />
      )}

      {showSettings && (
        <SettingsModal
          device={device}
          updateDevice={updateDevice}
          data={data}
          updateData={updateData}
          currentAccount={currentAccount}
          onSwitchAccount={() => { setShowSettings(false); updateDevice({ accountId: null }); }}
          onClose={() => setShowSettings(false)}
        />
      )}

      {showConfetti && <Confetti />}
    </div>
  );
}

function Modal({ title, body, buttons, onClose }) {
  return (
    <div className="modal-backdrop" onClick={onClose}>
      <div className="modal" onClick={(e) => e.stopPropagation()}>
        <h3>{title}</h3>
        <p>{body}</p>
        <div className="modal-buttons">{buttons}</div>
      </div>
    </div>
  );
}

function AddItemModal({ onAdd, onClose, existingCategories, prefillCategory, accountName }) {
  const [name, setName] = useState('');
  const [category, setCategory] = useState(prefillCategory || 'Eigen items');
  const [newCategory, setNewCategory] = useState('');
  const [emoji, setEmoji] = useState('📦');
  const [emojiTouched, setEmojiTouched] = useState(false);
  const [isPrivate, setIsPrivate] = useState(false);

  const isNewCat = category === '__new__';

  // Auto-suggest emoji op basis van naam (alleen als je 'm niet zelf hebt aangepast)
  useEffect(() => {
    if (!emojiTouched && name.trim().length >= 3) {
      const suggested = suggestEmoji(name);
      if (suggested && suggested !== '📦') {
        setEmoji(suggested);
      }
    }
  }, [name, emojiTouched]);

  const handleAdd = () => {
    if (!name.trim()) return;
    const finalCat = isNewCat ? (newCategory.trim() || 'Eigen items') : category;
    onAdd(capitalize(name.trim()), finalCat, emoji.trim() || '📦', isPrivate);
  };

  const baseCats = ['Eigen items', 'Reisdocumenten', 'Verzorging', 'Kleding', 'Handbagage', 'Overige'];
  const extraCats = existingCategories.filter((c) => !baseCats.includes(c));
  const allCats = [...baseCats, ...extraCats];

  return (
    <div className="modal-backdrop" onClick={onClose}>
      <div className="modal" onClick={(e) => e.stopPropagation()}>
        <h3>Eigen item toevoegen</h3>
        <p>{isPrivate ? `Privé item, alleen jij (${accountName}) ziet dit.` : 'Verschijnt op alle telefoons.'}</p>
        <div className="input-group">
          <label>Naam</label>
          <input
            type="text"
            value={name}
            onChange={(e) => setName(e.target.value)}
            placeholder="Bijv. kampeerstoel"
            autoFocus
            maxLength={30}
            autoCapitalize="sentences"
          />
        </div>
        <div className="input-group">
          <label>Categorie</label>
          <select value={category} onChange={(e) => setCategory(e.target.value)}>
            {allCats.map((c) => <option key={c} value={c}>{c}</option>)}
            <option value="__new__">＋ Nieuwe categorie maken</option>
          </select>
        </div>
        {isNewCat && (
          <div className="input-group">
            <label>Nieuwe categorie naam</label>
            <input type="text" value={newCategory} onChange={(e) => setNewCategory(e.target.value)} placeholder="Bijv. Caravan spullen" maxLength={25} autoFocus />
          </div>
        )}
        <div className="input-group">
          <label>Emoji {!emojiTouched && name.length >= 3 && <span style={{ color: 'var(--leaf-deep)', fontSize: 10 }}>(auto)</span>}</label>
          <input
            type="text"
            value={emoji}
            onChange={(e) => { setEmoji(e.target.value); setEmojiTouched(true); }}
            maxLength={2}
            placeholder="📦"
          />
        </div>
        <div className="input-group">
          <label style={{ display: 'flex', alignItems: 'center', gap: 8, cursor: 'pointer', textTransform: 'none', letterSpacing: 'normal', fontSize: 13 }}>
            <input
              type="checkbox"
              checked={isPrivate}
              onChange={(e) => setIsPrivate(e.target.checked)}
              style={{ width: 18, height: 18, margin: 0 }}
            />
            <span>🔒 Privé item (alleen op deze telefoon, voor {accountName || 'jou'})</span>
          </label>
        </div>
        <div className="modal-buttons">
          <button className="btn btn-secondary" onClick={onClose}>Annuleer</button>
          <button className="btn btn-primary" onClick={handleAdd} disabled={!name.trim() || (isNewCat && !newCategory.trim())}>Toevoegen</button>
        </div>
      </div>
    </div>
  );
}

function EditItemModal({ item, quantity, onSave, onDelete, onClose, existingCategories }) {
  const [name, setName] = useState(item.n);
  const [category, setCategory] = useState(item.c);
  const [newCategory, setNewCategory] = useState('');
  const [emoji, setEmoji] = useState(item.e);
  const [qty, setQty] = useState(quantity || 1);
  const [confirmingDelete, setConfirmingDelete] = useState(false);

  const isNewCat = category === '__new__';

  const handleSave = () => {
    if (!name.trim()) return;
    const finalCat = isNewCat ? (newCategory.trim() || 'Eigen items') : category;
    onSave(item.id, { n: capitalize(name.trim()), c: finalCat, e: emoji.trim() || '📦', quantity: Math.max(1, qty) });
  };

  const baseCats = ['Eigen items', 'Reisdocumenten', 'Verzorging', 'Kleding', 'Handbagage', 'Overige'];
  const extraCats = existingCategories.filter((c) => !baseCats.includes(c));
  const allCats = [...baseCats, ...extraCats];
  if (!allCats.includes(item.c)) allCats.push(item.c);

  if (confirmingDelete) {
    return (
      <div className="modal-backdrop" onClick={onClose}>
        <div className="modal" onClick={(e) => e.stopPropagation()}>
          <h3>"{item.n}" verwijderen?</h3>
          <p>Dit item wordt uit de lijst gehaald. Dit kan niet ongedaan gemaakt worden.</p>
          <div className="modal-buttons">
            <button className="btn btn-secondary" onClick={() => setConfirmingDelete(false)}>Terug</button>
            <button className="btn btn-danger" onClick={() => onDelete(item.id)}>Verwijder</button>
          </div>
        </div>
      </div>
    );
  }

  return (
    <div className="modal-backdrop" onClick={onClose}>
      <div className="modal" onClick={(e) => e.stopPropagation()}>
        <h3>Item bewerken</h3>
        <p>Pas het item aan of verwijder het uit de lijst.</p>
        <div className="input-group">
          <label>Naam</label>
          <input type="text" value={name} onChange={(e) => setName(e.target.value)} maxLength={30} autoCapitalize="sentences" />
        </div>
        <div className="input-group">
          <label>Categorie</label>
          <select value={category} onChange={(e) => setCategory(e.target.value)}>
            {allCats.map((c) => <option key={c} value={c}>{c}</option>)}
            <option value="__new__">＋ Nieuwe categorie maken</option>
          </select>
        </div>
        {isNewCat && (
          <div className="input-group">
            <label>Nieuwe categorie naam</label>
            <input type="text" value={newCategory} onChange={(e) => setNewCategory(e.target.value)} placeholder="Bijv. Caravan spullen" maxLength={25} autoFocus />
          </div>
        )}
        <div style={{ display: 'flex', gap: 10 }}>
          <div className="input-group" style={{ flex: 1 }}>
            <label>Emoji</label>
            <input type="text" value={emoji} onChange={(e) => setEmoji(e.target.value)} maxLength={2} />
          </div>
          <div className="input-group" style={{ flex: 1 }}>
            <label>Aantal</label>
            <input type="number" min="1" max="99" value={qty} onChange={(e) => setQty(parseInt(e.target.value) || 1)} />
          </div>
        </div>
        <div className="modal-buttons" style={{ marginBottom: 10 }}>
          <button className="btn btn-secondary" onClick={onClose}>Annuleer</button>
          <button className="btn btn-primary" onClick={handleSave} disabled={!name.trim() || (isNewCat && !newCategory.trim())}>Opslaan</button>
        </div>
        <button
          className="btn btn-danger"
          style={{ width: '100%' }}
          onClick={() => setConfirmingDelete(true)}
        >
          🗑 Verwijderen
        </button>
      </div>
    </div>
  );
}

function AccountPicker({ accounts, onPick }) {
  return (
    <div className="account-picker">
      <h1 className="picker-title">
        Kies je <span className="picker-title-accent">profiel</span>
      </h1>
      <div className="picker-grid">
        {accounts.map((a) => (
          <button
            key={a.id}
            className="picker-card"
            onClick={() => onPick(a.id)}
            style={{
              '--card-color': a.color,
            }}
          >
            <span className="picker-card-avatar" style={{ background: a.color }}>
              {a.name.charAt(0)}
            </span>
            <span className="picker-card-name">{a.name}</span>
          </button>
        ))}
      </div>
    </div>
  );
}

function SettingsModal({ device, updateDevice, data, updateData, currentAccount, onSwitchAccount, onClose }) {
  const [editingName, setEditingName] = useState(false);
  const [newName, setNewName] = useState(currentAccount?.name || '');
  const [dateInput, setDateInput] = useState(data.departureDate ? data.departureDate.slice(0, 10) : '');

  const saveName = () => {
    if (!newName.trim() || !currentAccount) return;
    updateData((prev) => ({
      ...prev,
      accounts: prev.accounts.map((a) => a.id === currentAccount.id ? { ...a, name: capitalize(newName.trim()) } : a),
    }));
    setEditingName(false);
  };

  const saveDepartureDate = () => {
    updateData((prev) => ({ ...prev, departureDate: dateInput || null }));
  };

  return (
    <div className="modal-backdrop" onClick={onClose}>
      <div className="modal" onClick={(e) => e.stopPropagation()} style={{ maxWidth: 420 }}>
        <h3>Instellingen</h3>

        <div className="input-group">
          <label>Account</label>
          {editingName ? (
            <div style={{ display: 'flex', gap: 8 }}>
              <input
                type="text"
                value={newName}
                onChange={(e) => setNewName(e.target.value)}
                maxLength={20}
                autoFocus
                style={{ flex: 1 }}
              />
              <button className="btn btn-primary" style={{ flex: 'none', padding: '8px 14px' }} onClick={saveName}>OK</button>
            </div>
          ) : (
            <div style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '10px 14px', background: 'var(--bg-deep)', borderRadius: 10 }}>
              <span className="mini-avatar" style={{ background: currentAccount?.color, width: 28, height: 28, fontSize: 12 }}>
                {currentAccount?.name?.charAt(0)}
              </span>
              <span style={{ flex: 1, fontSize: 14 }}>{currentAccount?.name}</span>
              <button onClick={() => setEditingName(true)} style={{ background: 'none', border: 'none', color: 'var(--ink-soft)', cursor: 'pointer', fontSize: 13 }}>✏️</button>
            </div>
          )}
          <button
            onClick={onSwitchAccount}
            style={{ marginTop: 8, background: 'none', border: 'none', color: 'var(--leaf-deep)', fontSize: 12, cursor: 'pointer', padding: 0, textAlign: 'left' }}
          >
            Wissel naar een ander account →
          </button>
        </div>

        <div className="input-group">
          <label>Vertrekdatum</label>
          <div style={{ display: 'flex', gap: 8 }}>
            <input
              type="date"
              value={dateInput}
              onChange={(e) => setDateInput(e.target.value)}
              style={{ flex: 1 }}
            />
            <button className="btn btn-primary" style={{ flex: 'none', padding: '8px 14px' }} onClick={saveDepartureDate}>OK</button>
          </div>
        </div>

        <div className="input-group">
          <label>Aantal kolommen ({device.columns})</label>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(6, 1fr)', gap: 6 }}>
            {[3, 4, 5, 6, 7, 8].map((n) => (
              <button
                key={n}
                onClick={() => updateDevice({ columns: n })}
                style={{
                  padding: '10px 0',
                  border: '1.5px solid ' + (device.columns === n ? 'var(--leaf)' : 'var(--border-mid)'),
                  background: device.columns === n ? 'var(--leaf)' : 'var(--bg-card)',
                  color: device.columns === n ? 'white' : 'var(--ink)',
                  borderRadius: 8,
                  fontSize: 14,
                  fontWeight: 600,
                  cursor: 'pointer',
                }}
              >{n}</button>
            ))}
          </div>
        </div>

        <div className="input-group">
          <label style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', textTransform: 'none', letterSpacing: 'normal', fontSize: 14 }}>
            <span>🌙 Donkere modus</span>
            <input
              type="checkbox"
              checked={device.darkMode}
              onChange={(e) => updateDevice({ darkMode: e.target.checked })}
              style={{ width: 22, height: 22 }}
            />
          </label>
        </div>

        <div className="input-group">
          <label style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', textTransform: 'none', letterSpacing: 'normal', fontSize: 14 }}>
            <span>🔊 Geluid bij inpakken</span>
            <input
              type="checkbox"
              checked={device.soundEnabled}
              onChange={(e) => updateDevice({ soundEnabled: e.target.checked })}
              style={{ width: 22, height: 22 }}
            />
          </label>
        </div>

        <button
          onClick={() => { if (confirm('Alle items terugzetten naar uit?')) { updateData((prev) => ({ ...prev, states: {}, packedBy: {} })); onClose(); } }}
          className="btn btn-secondary"
          style={{ width: '100%', flex: 'none', marginTop: 8 }}
        >
          ↻ Reset alle vinkjes
        </button>

        <div className="modal-buttons" style={{ marginTop: 12 }}>
          <button className="btn btn-primary" style={{ width: '100%' }} onClick={onClose}>Sluit</button>
        </div>
      </div>
    </div>
  );
}

function Confetti() {
  // Genereer 80 stukjes confetti met willekeurige posities, kleuren en duur
  const colors = ['#e8a838', '#d4634a', '#4a7a5c', '#2d5a3f', '#c8881a', '#f0b84a'];
  const pieces = [];
  for (let i = 0; i < 80; i++) {
    const left = Math.random() * 100;
    const delay = Math.random() * 1.5;
    const duration = 2.5 + Math.random() * 2;
    const color = colors[Math.floor(Math.random() * colors.length)];
    const width = 6 + Math.random() * 8;
    const height = 8 + Math.random() * 10;
    pieces.push(
      <div
        key={i}
        className="confetti-piece"
        style={{
          left: left + '%',
          background: color,
          width: width + 'px',
          height: height + 'px',
          animationDelay: delay + 's',
          animationDuration: duration + 's',
        }}
      />
    );
  }
  return <div className="confetti-container">{pieces}</div>;
}
