        newSub[subIdx] = newLabel;
        const newEmojis = Array.isArray(it.subEmojis) ? [...it.subEmojis] : [];
        while (newEmojis.length < newSub.length) newEmojis.push(it.e || '📦');
        newEmojis[subIdx] = newEmoji;
        return { ...it, sub: newSub, subEmojis: newEmojis };
      }
      return it;
    });
    if (isPrivateItem(id)) {
      updatePrivateData((prev) => ({ ...prev, items: updateItems(prev.items) }));
    } else {
      updateData((prev) => ({ ...prev, items: updateItems(prev.items) }));
    }
  };

  // Subitem-verantwoordelijke instellen
  const getSubResponsibles = (id) => {
    const store = isPrivateItem(id) ? (privateData.subResponsibleFor || {}) : (data.subResponsibleFor || {});
    return store[id] || {};
  };
  const setSubResponsibility = (id, subIdx, accountId) => {
    if (isPrivateItem(id)) {
      updatePrivateData((prev) => {
        const all = { ...(prev.subResponsibleFor || {}) };
        const forItem = { ...(all[id] || {}) };
        if (accountId) forItem[subIdx] = accountId;
        else delete forItem[subIdx];
        if (Object.keys(forItem).length === 0) delete all[id];
        else all[id] = forItem;
        return { ...prev, subResponsibleFor: all };
      });
    } else {
      updateData((prev) => {
        const all = { ...(prev.subResponsibleFor || {}) };
        const forItem = { ...(all[id] || {}) };
        if (accountId) forItem[subIdx] = accountId;
        else delete forItem[subIdx];
        if (Object.keys(forItem).length === 0) delete all[id];
        else all[id] = forItem;
        return { ...prev, subResponsibleFor: all };
      });
    }
  };

  // Helper: is de "Voor vertrek" categorie momenteel vergrendeld?
  // Geblokkeerd tot 2 dagen voor vertrek.
  const getVoorVertrekDaysLeft = () => {
    if (!data.departureDate) return null;
    const today = new Date();
    today.setHours(0, 0, 0, 0);
    const dep = new Date(data.departureDate);
    dep.setHours(0, 0, 0, 0);
    return Math.ceil((dep - today) / (1000 * 60 * 60 * 24));
  };
  const isVoorVertrekLocked = (id) => {
    const item = (data.items || []).find((it) => it.id === id);
    if (!item || item.c !== 'Voor vertrek') return false;
    const days = getVoorVertrekDaysLeft();
    return days !== null && days > 2;
  };

  const handleClick = (id) => {
    // Onderdruk click als long-press net gefired heeft
    if (longPressFiredRef.current) {
      longPressFiredRef.current = false;
      return;
    }
    // "Voor vertrek" categorie: gelocked tot 2 dagen voor vertrek
    if (isVoorVertrekLocked(id)) {
      if (navigator.vibrate) navigator.vibrate([4, 60, 4]);
      return;
    }
    const current = getItemState(id);
    const subLabels = getSubLabels(id);

    // Items met subitems (of q > 1): open modal
    if (subLabels && subLabels.length > 0) {
      if (current === 'packed') {
        // Uitpakken vraagt bevestiging (zoals bij gewone items)
        setConfirmUnpack(id);
        return;
      }
      setOpenSubItem(id);
      return;
    }

    // Gewone (enkele) items: 1 klik → ready, 2e klik → packed
    if (current === 'open') {
      if (navigator.vibrate) navigator.vibrate(10);
      playSound('ready');
      setItemStateAndProgress(id, 'ready', 0);
    } else if (current === 'ready') {
      if (navigator.vibrate) navigator.vibrate([10, 30, 20]);
      playSound('pack');
      triggerGlow([id]);
      setPackingIds((prev) => new Set([...prev, id]));
      setTimeout(() => {
        setPackingIds((prev) => {
          const n = new Set(prev);
          n.delete(id);
          return n;
        });
      }, 500);
      setItemStateAndProgress(id, 'packed', undefined);
    } else {
      setConfirmUnpack(id);
    }
  };

  const confirmUnpackYes = () => {
    playSound('unpack');
    // Reset progress naar totaal aantal
    const quantity = getQuantity(confirmUnpack);
    setItemStateAndProgress(confirmUnpack, 'open', quantity);
    resetSubReady(confirmUnpack);
    setConfirmUnpack(null);
  };

  const addCustomItem = (name, category, emoji, isPrivate, newCategoryIcon) => {
    const newItem = {
      id: (isPrivate ? 'p' : 'c') + Date.now(),
      n: capitalize(name),
      c: category,
      e: emoji || suggestEmoji(name) || '📦',
      private: !!isPrivate,
    };
    if (isPrivate) {
      updatePrivateData((prev) => ({ ...prev, items: [...prev.items, newItem] }));
    } else {
      updateData((prev) => {
        const newCatIcons = { ...(prev.categoryIcons || {}) };
        if (newCategoryIcon && !CATEGORY_ICONS[category] && !newCatIcons[category]) {
          newCatIcons[category] = newCategoryIcon;
        }
        return {
          ...prev,
          items: [...prev.items, newItem],
          categoryIcons: newCatIcons,
        };
      });
    }
    setShowAdd(false);
    setAddPrefillCat(null);
  };

  // Toon undo toast (5s) na een actie die ongedaan gemaakt kan worden
  const showUndo = useCallback((label, restoreFn) => {
    if (undoTimerRef.current) clearTimeout(undoTimerRef.current);
    setUndoState({ label, restore: restoreFn, until: Date.now() + 5000 });
    undoTimerRef.current = setTimeout(() => {
      setUndoState(null);
      undoTimerRef.current = null;
    }, 5000);
  }, []);

  const dismissUndo = useCallback(() => {
    if (undoTimerRef.current) clearTimeout(undoTimerRef.current);
    undoTimerRef.current = null;
    setUndoState(null);
  }, []);

  const performUndo = useCallback(() => {
    if (undoState && typeof undoState.restore === 'function') {
      undoState.restore();
    }
    dismissUndo();
  }, [undoState, dismissUndo]);

  const deleteCustom = (id) => {
    if (isPrivateItem(id)) {
      // Bewaar snapshot voor undo
      const item = privateData.items.find((it) => it.id === id);
      const prevState = privateData.states[id];
      const prevQty = privateData.quantities[id];
      const prevProgress = privateData.progress[id];
      updatePrivateData((prev) => {
        const newStates = { ...prev.states };
        const newQ = { ...prev.quantities };
        const newP = { ...(prev.progress || {}) };
        delete newStates[id];
        delete newQ[id];
        delete newP[id];
        return { ...prev, items: prev.items.filter((it) => it.id !== id), states: newStates, quantities: newQ, progress: newP };
      });
      if (item) {
        showUndo(`"${item.n}" verwijderd`, () => {
          updatePrivateData((prev) => {
            const newStates = { ...prev.states };
            const newQ = { ...prev.quantities };
            const newP = { ...(prev.progress || {}) };
            if (prevState !== undefined) newStates[id] = prevState;
            if (prevQty !== undefined) newQ[id] = prevQty;
            if (prevProgress !== undefined) newP[id] = prevProgress;
            return { ...prev, items: [...prev.items, item], states: newStates, quantities: newQ, progress: newP };
          });
        });
      }
    } else {
      const item = data.items.find((it) => it.id === id);
      const prevState = data.states[id];
      const prevQty = data.quantities[id];
      const prevProgress = data.progress[id];
      const prevPackedBy = (data.packedBy || {})[id];
      const prevReadyBy = (data.readyBy || {})[id];
      const prevResp = (data.responsibleFor || {})[id];
      updateData((prev) => {
        const newStates = { ...prev.states };
        const newQ = { ...prev.quantities };
        const newP = { ...(prev.progress || {}) };
        const newPackedBy = { ...(prev.packedBy || {}) };
        const newReadyBy = { ...(prev.readyBy || {}) };
        const newResp = { ...(prev.responsibleFor || {}) };
        delete newStates[id];
        delete newQ[id];
        delete newP[id];
        delete newPackedBy[id];
        delete newReadyBy[id];
        delete newResp[id];
        return { ...prev, items: prev.items.filter((it) => it.id !== id), states: newStates, quantities: newQ, progress: newP, packedBy: newPackedBy, readyBy: newReadyBy, responsibleFor: newResp };
      });
      if (item) {
        showUndo(`"${item.n}" verwijderd`, () => {
          updateData((prev) => {
            const newStates = { ...prev.states };
            const newQ = { ...prev.quantities };
            const newP = { ...(prev.progress || {}) };
            const newPackedBy = { ...(prev.packedBy || {}) };
            const newReadyBy = { ...(prev.readyBy || {}) };
            const newResp = { ...(prev.responsibleFor || {}) };
            if (prevState !== undefined) newStates[id] = prevState;
            if (prevQty !== undefined) newQ[id] = prevQty;
            if (prevProgress !== undefined) newP[id] = prevProgress;
            if (prevPackedBy !== undefined) newPackedBy[id] = prevPackedBy;
            if (prevReadyBy !== undefined) newReadyBy[id] = prevReadyBy;
            if (prevResp !== undefined) newResp[id] = prevResp;
            return { ...prev, items: [...prev.items, item], states: newStates, quantities: newQ, progress: newP, packedBy: newPackedBy, readyBy: newReadyBy, responsibleFor: newResp };
          });
        });
      }
    }
  };

  // Pas een item aan
  const updateItem = (id, updates) => {
    if (updates.n) updates.n = capitalize(updates.n);
    const itemUpdates = { n: updates.n, c: updates.c, e: updates.e };
    if (isPrivateItem(id)) {
      updatePrivateData((prev) => {
        const newQuantities = updates.quantity !== undefined
          ? { ...prev.quantities, [id]: updates.quantity }
          : prev.quantities;
        const newProgress = updates.quantity !== undefined
          ? { ...(prev.progress || {}), [id]: updates.quantity }
          : (prev.progress || {});
        return {
          ...prev,
          items: prev.items.map((it) => (it.id === id ? { ...it, ...itemUpdates } : it)),
          quantities: newQuantities,
          progress: newProgress,
        };
      });
    } else {
      updateData((prev) => {
        const newQuantities = updates.quantity !== undefined
          ? { ...prev.quantities, [id]: updates.quantity }
          : prev.quantities;
        const newProgress = updates.quantity !== undefined
          ? { ...(prev.progress || {}), [id]: updates.quantity }
          : (prev.progress || {});
        // Responsible
        const newResp = { ...(prev.responsibleFor || {}) };
        if (updates.responsible) {
          newResp[id] = updates.responsible;
        } else if (updates.responsible === null || updates.responsible === '') {
          delete newResp[id];
        }
        // Nieuwe categorie icoon
        const newCatIcons = { ...(prev.categoryIcons || {}) };
        if (updates.newCategoryIcon && updates.c && !CATEGORY_ICONS[updates.c] && !newCatIcons[updates.c]) {
          newCatIcons[updates.c] = updates.newCategoryIcon;
        }
        return {
          ...prev,
          items: prev.items.map((it) => (it.id === id ? { ...it, ...itemUpdates } : it)),
          quantities: newQuantities,
          progress: newProgress,
          responsibleFor: newResp,
          categoryIcons: newCatIcons,
        };
      });
    }
    setEditingItem(null);
  };

  // Verwijder een item
  const deleteAnyItem = (id) => {
    deleteCustom(id);
    setEditingItem(null);
  };

  const resetAll = () => {
    updateData((prev) => ({ ...prev, states: {}, packedBy: {}, progress: {} }));
    if (device.accountId) {
      updatePrivateData((prev) => ({ ...prev, states: {}, progress: {} }));
    }
    setConfirmReset(false);
  };

  const grouped = useMemo(() => {
    // Combineer gedeelde en privé items
    const allItems = [...data.items, ...privateData.items];
    const allStates = { ...data.states };
    privateData.items.forEach((it) => {
      if (privateData.states[it.id]) allStates[it.id] = privateData.states[it.id];
    });

    // Filter op zoekterm met fuzzy matching
    const q = search.trim().toLowerCase();
    let visibleItems = allItems;
    if (q.length > 0) {
      visibleItems = allItems.filter((it) => {
        const name = it.n.toLowerCase();
        if (name.includes(q)) return true;
        // Fuzzy: kijk per woord in naam
        const words = name.split(/\s+/);
        for (const w of words) {
          if (w.startsWith(q)) return true;
          // Levenshtein op woorden van vergelijkbare lengte
          if (Math.abs(w.length - q.length) <= 2) {
            const d = levenshtein(w, q);
            if (d <= Math.max(1, Math.floor(q.length / 4))) return true;
          }
        }
        // Hele naam fuzzy match
        if (Math.abs(name.length - q.length) <= 3) {
          const d = levenshtein(name, q);
          if (d <= Math.max(1, Math.floor(q.length / 3))) return true;
        }
        return false;
      });
    }

    const open = visibleItems.filter((it) => (allStates[it.id] || 'open') !== 'packed');
    const packed = visibleItems.filter((it) => allStates[it.id] === 'packed');

    const byCategory = {};
    open.forEach((it) => {
      if (!byCategory[it.c]) byCategory[it.c] = [];
      byCategory[it.c].push(it);
    });
    Object.keys(byCategory).forEach((c) => {
      byCategory[c].sort((a, b) => a.n.localeCompare(b.n, 'nl'));
    });

    // Volgorde: eerst alle gedeelde categorieën, dan Voor vertrek, dan Overig (laatste gedeelde), dan privé categorieën
    const sharedOrder = ['Documenten', 'Tent en slapen', 'Koken en keuken', 'Eten en drinken', 'Schoonmaak en wassen', 'Buiten en relax', 'Stroom en techniek', 'Handdoeken', 'EHBO en gezondheid', 'Voor vertrek', 'Overig'];
    const privateOrder = ['Eigen documenten', 'Verzorging', 'Kleding', 'Elektronica', 'Vrije tijd', 'Eigen items'];
    const catOrder = [...sharedOrder, ...privateOrder];
    const ordered = catOrder.filter((c) => byCategory[c]).map((c) => ({ name: c, items: byCategory[c] }));
    // Onbekende categorieen toevoegen vlak voor Overig
    const extraCats = Object.keys(byCategory).filter((c) => !catOrder.includes(c));
    if (extraCats.length > 0) {
      const overigeIndex = ordered.findIndex((g) => g.name === 'Overig');
      const extras = extraCats.map((c) => ({ name: c, items: byCategory[c] }));
      if (overigeIndex >= 0) {
        ordered.splice(overigeIndex, 0, ...extras);
      } else {
        ordered.push(...extras);
      }
    }

    packed.sort((a, b) => a.n.localeCompare(b.n, 'nl'));
    return { open: ordered, packed, totalPacked: packed.length, allItems, allStates };
  }, [data, privateData, search]);

  // Items die meetellen voor voortgang (exclusief "Voor onderweg")
  const trackedItems = grouped.allItems.filter((it) => it.c !== ON_THE_DAY_CATEGORY);
  const total = trackedItems.length;

  // Per-persoon stats voor segmenten in voortgangsbalken
  const stats = useMemo(() => {
    const perPersonPacked = {};   // accountId -> aantal
    const perPersonReady = {};
    let packedCount = 0;
    let readyCount = 0;
    const packedByMap = data.packedBy || {};
    const readyByMap = data.readyBy || {};
    trackedItems.forEach((it) => {
      const state = grouped.allStates[it.id] || 'open';
      if (state === 'packed') {
        packedCount++;
        const who = packedByMap[it.id] || 'unknown';
        perPersonPacked[who] = (perPersonPacked[who] || 0) + 1;
      } else if (state === 'ready') {
        readyCount++;
        // "Klaar" wordt toegerekend aan wie hem als eerste aanklikte
        const who = readyByMap[it.id] || 'unknown';
        perPersonReady[who] = (perPersonReady[who] || 0) + 1;
      }
    });
    return { packedCount, readyCount, perPersonPacked, perPersonReady };
  }, [trackedItems, grouped.allStates, data.packedBy, data.readyBy]);

  const packedCount = stats.packedCount;
  const readyCount = stats.readyCount;
  // Altijd naar beneden afronden, behalve als echt alles ingepakt is
  const percent = total > 0
    ? (packedCount >= total ? 100 : Math.floor((packedCount / total) * 100))
    : 0;

  // Confetti afspelen wanneer we 100% bereiken door eigen actie.
  // We onthouden de vorige percent én of de laatste data-update lokaal kwam
  // (lokaal = via updateData, dus eigen actie; remote = via setData in polling).
  const prevPercentRef = useRef(null);
  const lastChangeWasLocalRef = useRef(false);

  // Track of een update lokaal of remote was: wrap setData voor data-changes
  // door updateData (lokaal=true) en polling (lokaal=false). Hier detecteren
  // we via lastUpdated wijziging op dataRef vs lastSyncedRef.
  useEffect(() => {
    if (!loaded) return;
    // Als de huidige data.lastUpdated nieuwer is dan wat we als laatst remote
    // gesynced hebben, dan kwam de verandering lokaal.
    lastChangeWasLocalRef.current = (data.lastUpdated || 0) > (lastSyncedRef.current || 0);
  }, [data.lastUpdated, loaded]);

  useEffect(() => {
    if (!loaded) return;
    // Eerste keer alleen huidige waarde onthouden, geen confetti
    if (prevPercentRef.current === null) {
      prevPercentRef.current = percent;
      return;
    }
    if (percent === 100 && prevPercentRef.current < 100 && lastChangeWasLocalRef.current) {
      setShowConfetti(true);
      if (navigator.vibrate) navigator.vibrate([50, 50, 50, 50, 200]);
      setTimeout(() => setShowConfetti(false), 5000);
    }
    prevPercentRef.current = percent;
  }, [percent, loaded]);

  const statusText = {
    synced: '✓ Gesynchroniseerd',
    syncing: '↻ Synchroniseren',
    offline: '⚠ Offline',
    local: '💾 Alleen lokaal',
  }[syncStatus];

  // Account picker tonen als geen account is gekozen
  if (!device.accountId) {
    return (
      <AccountPicker
        accounts={data.accounts}
        onPick={(accountId) => updateDevice({ accountId })}
      />
    );
  }

  const currentAccount = data.accounts.find((a) => a.id === device.accountId);
  const collapsedSet = new Set(device.collapsedCategories || []);
  const toggleCategory = (catName) => {
    updateDevice((prev) => {
      const isCollapsed = (prev.collapsedCategories || []).includes(catName);
      return {
        ...prev,
        collapsedCategories: isCollapsed
          ? prev.collapsedCategories.filter((c) => c !== catName)
          : [...(prev.collapsedCategories || []), catName],
      };
    });
  };

  // Vertrek-aftelling berekenen
  const daysUntilDeparture = (() => {
    if (!data.departureDate) return null;
    const today = new Date();
    today.setHours(0, 0, 0, 0);
    const dep = new Date(data.departureDate);
    dep.setHours(0, 0, 0, 0);
    const days = Math.ceil((dep - today) / (1000 * 60 * 60 * 24));
    return days;
  })();

  const accountById = (id) => data.accounts.find((a) => a.id === id);
  const renderItem = (item, inPackedSection) => {
    const state = grouped.allStates[item.id] || 'open';
    const isPrivate = checkIsPrivate(item);
    const quantity = isPrivate
      ? (privateData.quantities[item.id] || 1)
      : (data.quantities[item.id] || 1);
    const packerId = (data.packedBy || {})[item.id];
    const packer = packerId ? accountById(packerId) : null;
    const respId = (data.responsibleFor || {})[item.id];
    const resp = respId ? accountById(respId) : null;

    // Subitems logica (incl. q > 1 die als identieke subitems renderen)
    const subLabels = getSubLabels(item.id);
    const hasSubs = !!(subLabels && subLabels.length > 0);
    const subReady = hasSubs ? getSubReady(item.id) : [];
    const subTotal = hasSubs ? subLabels.length : 0;
    const subDoneCount = subReady.length;
    const isMulti = hasSubs;
    const isCounting = hasSubs && subDoneCount > 0 && subDoneCount < subTotal && state !== 'packed';
    const fillPct = hasSubs && state !== 'packed'
      ? Math.round((subDoneCount / subTotal) * 100)
      : 0;

    // Inline style voor responsible-rand (alleen als er nog niet ingepakt is)
    const respStyle = resp && state !== 'packed' && !inPackedSection
      ? { borderColor: resp.color, borderWidth: '2px', borderStyle: 'solid' }
      : {};
    return (
      <div
        key={item.id}
        className={`item ${inPackedSection ? 'packed' : state} ${glowingIds.has(item.id) ? 'glowing' : ''} ${packingIds.has(item.id) ? 'packing-animation' : ''} ${isCounting ? 'counting' : ''} ${resp ? 'has-resp' : ''} ${hasSubs ? 'has-subs' : ''}`}
        style={respStyle}
        onClick={() => handleClick(item.id)}
        onContextMenu={(e) => { e.preventDefault(); setEditingItem(item); }}
        onTouchStart={(e) => handleTouchStart(e, item)}
        onTouchEnd={handleTouchEnd}
        onTouchMove={handleTouchEnd}
        onTouchCancel={handleTouchEnd}
      >
        {hasSubs && fillPct > 0 && !inPackedSection && (
          <div className="sub-fill" style={{ height: `${fillPct}%` }}>
            <svg
              className="sub-fill-wave"
              viewBox="0 0 240 12"
              preserveAspectRatio="none"
              aria-hidden="true"
            >
              {/* Twee aaneengesloten golf-cycli; CSS verschuift de svg naar links voor een naadloze loop */}
              <path d="M0,6 Q15,0 30,6 T60,6 T90,6 T120,6 T150,6 T180,6 T210,6 T240,6 L240,12 L0,12 Z" />
            </svg>
          </div>
        )}
        {isPrivate && <span className="item-private-badge">🔒</span>}
        {packer && (
          <span className="item-account-badge" style={{ background: packer.color }} title={packer.name}>
            {packer.name.charAt(0)}
          </span>
        )}
        {resp && !packer && (
          <span className="item-resp-badge" style={{ background: resp.color }} title={`${resp.name} pakt dit in`}>
            {resp.name.charAt(0)}
          </span>
        )}
        <span className="item-icon">{item.e}</span>
        <span className="item-label">{item.n}</span>
        {isMulti && !inPackedSection && (
          <span className={`item-counter ${isCounting ? 'active' : ''}`}>
            <span className="counter-num">{subDoneCount}</span>
            <span className="counter-slash">/</span>
            <span className="counter-total">{subTotal}</span>
          </span>
        )}
        {isMulti && inPackedSection && (
          <span className="item-quantity-badge">×{subTotal}</span>
        )}
      </div>
    );
  };

  return (
    <div className="app" data-cols={device.columns} style={{ '--cols': device.columns }}>
      <div className="top-row">
        <div
          className="account-chip"
          onClick={() => setShowSettings(true)}
        >
          <span className="mini-avatar" style={{ background: currentAccount?.color || '#888' }}>
            {currentAccount?.name?.charAt(0) || '?'}
          </span>
          <span>{currentAccount?.name || 'Onbekend'}</span>
        </div>
      </div>
      <div className="header">
        <h1>Konings <span className="ampersand">Vakantie</span>paklijst</h1>
        <div className="subtitle">caravan inpakker</div>
        <div className={`sync-status ${syncStatus}`}>
          <span className="sync-dot"></span>
          {statusText}
        </div>
      </div>

      {daysUntilDeparture !== null && (
        <div className="countdown-card">
          <div className="countdown-line">
            {daysUntilDeparture > 0
              ? `${daysUntilDeparture} ${daysUntilDeparture === 1 ? 'dag' : 'dagen'} voor vertrek`
              : daysUntilDeparture === 0 ? 'Vandaag vertrek!' : 'Geniet van je vakantie!'}
          </div>
        </div>
      )}

      <div className="progress-card">
        <div className="progress-row">
          <div className="progress-row-label">
            <span>Klaargelegd</span>
            <span className="count">{readyCount}<span style={{ opacity: 0.5 }}> / {total}</span></span>
          </div>
          <div className="progress-bar ready-bar">
            {data.accounts.map((a) => {
              const c = stats.perPersonReady[a.id] || 0;
              if (c === 0) return null;
              const widthPct = (c / total) * 100;
              return (
                <div
                  key={a.id}
                  className="progress-segment"
                  style={{ width: widthPct + '%', background: a.color }}
                >
                  {widthPct > 8 ? a.name.charAt(0) : ''}
                </div>
              );
            })}
            {(stats.perPersonReady['unknown'] || 0) > 0 && (
              <div
                className="progress-segment"
                style={{
                  width: ((stats.perPersonReady['unknown'] / total) * 100) + '%',
                  background: '#888',
                }}
              >?</div>
            )}
          </div>
        </div>

        <div className="progress-row">
          <div className="progress-row-label">
            <span>Ingepakt</span>
            <span className="count">{packedCount}<span style={{ opacity: 0.5 }}> / {total}</span></span>
          </div>
          <div className="progress-bar">
            {data.accounts.map((a) => {
              const c = stats.perPersonPacked[a.id] || 0;
              if (c === 0) return null;
              const widthPct = (c / total) * 100;
              return (
                <div
                  key={a.id}
                  className="progress-segment"
                  style={{ width: widthPct + '%', background: a.color }}
                >
                  {widthPct > 8 ? a.name.charAt(0) : ''}
                </div>
              );
            })}
            {(stats.perPersonPacked['unknown'] || 0) > 0 && (
              <div
                className="progress-segment"
                style={{
                  width: ((stats.perPersonPacked['unknown'] / total) * 100) + '%',
                  background: '#888',
                }}
              >?</div>
            )}
          </div>
        </div>

        <div className="progress-percent">{percent}% INGEPAKT</div>
      </div>

      {daysUntilDeparture !== null && daysUntilDeparture < -14 && (
        <div style={{
          background: 'rgba(212, 99, 74, 0.12)',
          border: '1px solid var(--coral)',
          borderRadius: 12,
          padding: '10px 14px',
          marginBottom: 14,
          fontSize: 13,
          color: 'var(--ink)',
          display: 'flex',
          alignItems: 'center',
          gap: 10,
        }}>
          <span style={{ flex: 1 }}>De vertrekdatum is verlopen. Tijd voor een nieuwe vakantie?</span>
          <button
            onClick={() => setShowSettings(true)}
            className="btn btn-primary"
            style={{ flex: 'none', padding: '6px 12px', fontSize: 12 }}
          >Datum wijzigen</button>
        </div>
      )}

      {daysUntilDeparture !== null && daysUntilDeparture <= 2 && daysUntilDeparture >= 0 && (
        <button
          className="departure-mode-btn"
          onClick={() => setShowDepartureMode(true)}
        >
          🚗 Vertrek-check: bekijk wat er nog moet
        </button>
      )}

      <div className="search-bar">
        <input
          type="text"
          value={search}
          onChange={(e) => setSearch(e.target.value)}
          placeholder="Zoek een voorwerp..."
        />
        {search && <button className="search-clear" onClick={() => setSearch('')} aria-label="Wis">×</button>}
      </div>

      <div className="toolbar">
        <button className="tool-btn" onClick={() => { setAddPrefillCat(null); setShowAdd(true); }}>＋ Extra voorwerp</button>
      </div>

      {percent === 100 && (
        <div className="celebrate">
          <span className="celebrate-emoji">🏕️</span>
          <h2>Klaar voor vertrek!</h2>
          <p>Alles is ingepakt. Veilige reis!</p>
        </div>
      )}

      {(device.groupByCategory && !search.trim()) ? (
        (() => {
          const PRIVATE_CATS = new Set(['Eigen documenten', 'Verzorging', 'Kleding', 'Elektronica', 'Vrije tijd', 'Eigen items']);
          // Vind index van eerste privé groep
          const firstPrivateIdx = grouped.open.findIndex((g) => PRIVATE_CATS.has(g.name));
          // Voor vertrek lock berekening
          const vvDaysLeft = daysUntilDeparture;
          const vvLocked = vvDaysLeft !== null && vvDaysLeft > 2;
          return grouped.open.map((group, idx) => {
            const isCollapsed = collapsedSet.has(group.name);
            const isFirstPrivate = idx === firstPrivateIdx && firstPrivateIdx >= 0;
            const isVoorVertrek = group.name === 'Voor vertrek';
            const isLocked = isVoorVertrek && vvLocked;
            return (
              <React.Fragment key={group.name}>
                {isFirstPrivate && (
                  <div className="private-divider">
                    <span className="private-divider-icon">🔒</span>
                    <span className="private-divider-text">
                      <strong>Jouw privé voorwerpen</strong>
                      <small>Alleen jij ({currentAccount?.name || 'jij'}) ziet deze items</small>
                    </span>
                  </div>
                )}
                <div
                  className={`category ${PRIVATE_CATS.has(group.name) ? 'category-private' : ''} ${isLocked ? 'category-locked' : ''} ${isCollapsed ? 'collapsed' : ''}`}
                  data-count={`${group.items.length} ${group.items.length === 1 ? 'voorwerp' : 'voorwerpen'} verborgen`}
                >
                  <h2 className="category-title" onClick={() => toggleCategory(group.name)}>
                    <span className="category-icon">{CATEGORY_ICONS[group.name] || (data.categoryIcons && data.categoryIcons[group.name]) || '📦'}</span>
                    {displayCategory(group.name)}
                    <span className="category-chevron" aria-hidden="true">▼</span>
                  </h2>
                  {!isCollapsed && (
                    <div className="grid-wrapper">
                      <div className="grid">
                        {group.items.map((item) => renderItem(item, false))}
                        <button
                          className="category-add"
                          onClick={() => { setAddPrefillCat(group.name); setShowAdd(true); }}
                          aria-label={`Voorwerp toevoegen aan ${displayCategory(group.name)}`}
                          title={`Voorwerp toevoegen aan ${displayCategory(group.name)}`}
                        >＋</button>
                      </div>
                      {isLocked && (
                        <div className="category-lock-overlay">
                          <span className="lock-emoji">🔒</span>
                          <strong>Beschikbaar in {vvDaysLeft - 2} {vvDaysLeft - 2 === 1 ? 'dag' : 'dagen'}</strong>
                          <small>Deze checklist gaat open 2 dagen voor vertrek</small>
                        </div>
                      )}
                    </div>
                  )}
                </div>
              </React.Fragment>
            );
          });
        })()
      ) : (
        // Geen categorieën (of zoekmodus): alles plat alfabetisch
        <div className="category">
          <h2 className="category-title" style={{ cursor: 'default' }}>
            <span className="category-icon">{search.trim() ? '🔍' : '📋'}</span>
            {search.trim() ? `Zoekresultaten` : 'Alle voorwerpen'}
          </h2>
          <div className="grid">
            {(() => {
              const all = grouped.open.flatMap((g) => g.items);
              all.sort((a, b) => a.n.localeCompare(b.n, 'nl'));
              if (all.length === 0 && search.trim()) {
                return null;
              }
              return all.map((item) => renderItem(item, false));
            })()}
          </div>
          {search.trim() && grouped.open.flatMap((g) => g.items).length === 0 && grouped.packed.length === 0 && (
            <div className="empty">Geen voorwerpen gevonden voor "{search.trim()}"</div>
          )}
        </div>
      )}

      <div className="packed-section">
        <div className="packed-header">
          <h2>Ingepakte spullen</h2>
          <span className="packed-count">{packedCount}</span>
        </div>
        {grouped.packed.length === 0 ? (
          <div className="empty">{search ? 'Niks gevonden in ingepakt.' : 'Nog niks ingepakt, kom op!'}</div>
        ) : (
          <div className="grid">
            {grouped.packed.map((item) => renderItem(item, true))}
          </div>
        )}
      </div>

      {(daysUntilDeparture !== null && daysUntilDeparture < 0) && (
        <StatsCard
          stats={stats}
          accounts={data.accounts}
          total={packedCount}
          departureDate={data.departureDate}
        />
      )}

      {confirmUnpack && (
        <Modal
          title="Is dit toch niet ingepakt?"
          body="Dan zet ik 'm weer terug op de oorspronkelijke plek."
          onClose={() => setConfirmUnpack(null)}
          buttons={
            <>
              <button className="btn btn-secondary" onClick={() => setConfirmUnpack(null)}>Nee, laat staan</button>
              <button className="btn btn-primary" onClick={confirmUnpackYes}>Ja, terugzetten</button>
            </>
          }
        />
      )}

      {openSubItem && (() => {
        const item = (data.items || []).find((it) => it.id === openSubItem)
                  || (privateData.items || []).find((it) => it.id === openSubItem);
        if (!item) { setOpenSubItem(null); return null; }
        const labels = getSubLabels(openSubItem) || [];
        const emojis = labels.map((_, i) => getSubEmoji(openSubItem, i));
        const showNumbers = isMultiStuks(openSubItem);
        const readyArr = getSubReady(openSubItem);
        const readySet = new Set(readyArr);
        const allReady = readyArr.length === labels.length && labels.length > 0;
        const fillPct = labels.length > 0 ? Math.round((readyArr.length / labels.length) * 100) : 0;
        const subResponsibles = getSubResponsibles(openSubItem);
        return (
          <SubItemModal
            item={item}
            labels={labels}
            emojis={emojis}
            showNumbers={showNumbers}
            readySet={readySet}
            fillPct={fillPct}
            allReady={allReady}
            subResponsibles={subResponsibles}
            accounts={data.accounts}
            onToggleSub={(idx) => toggleSubReady(openSubItem, idx)}
            onAddSub={(label, emoji) => addSubItem(openSubItem, label, emoji)}
            onEditSub={(idx, label, emoji) => editSubItem(openSubItem, idx, label, emoji)}
            onRemoveSub={(idx) => removeSubItem(openSubItem, idx)}
            onSetSubResp={(idx, accId) => setSubResponsibility(openSubItem, idx, accId)}
            onPack={() => {
              packSubItem(openSubItem);
              setOpenSubItem(null);
            }}
            onClose={() => setOpenSubItem(null)}
          />
        );
      })()}

      {confirmReset && (
        <Modal
          title="Alles resetten?"
          body="Alle voorwerpen gaan terug naar de oorspronkelijke staat. Eigen toegevoegde voorwerpen blijven staan. Dit gebeurt op alle telefoons tegelijk."
          onClose={() => setConfirmReset(false)}
          buttons={
            <>
              <button className="btn btn-secondary" onClick={() => setConfirmReset(false)}>Annuleer</button>
              <button className="btn btn-danger" onClick={resetAll}>Ja, reset</button>
            </>
          }
        />
      )}

      {showAdd && (
        <AddItemModal
          onAdd={addCustomItem}
          onClose={() => { setShowAdd(false); setAddPrefillCat(null); }}
          existingCategories={[...new Set(grouped.allItems.map((it) => it.c))]}
          prefillCategory={addPrefillCat}
          accountName={currentAccount?.name}
        />
      )}

      {editingItem && (
        <EditItemModal
          item={editingItem}
          quantity={
            checkIsPrivate(editingItem)
              ? (privateData.quantities[editingItem.id] || 1)
              : ((data.quantities || {})[editingItem.id] || 1)
          }
          responsibleFor={(data.responsibleFor || {})[editingItem.id] || ''}
          accounts={data.accounts}
          onSave={updateItem}
          onDelete={deleteAnyItem}
          onClose={() => setEditingItem(null)}
          existingCategories={[...new Set(grouped.allItems.map((it) => it.c))]}
          onAddFirstSub={(label, emoji) => {
            const id = editingItem.id;
            addFirstSubItem(id, label, emoji);
            setEditingItem(null);
            // Kleine vertraging zodat de state-update door de DOM is
            setTimeout(() => setOpenSubItem(id), 50);
          }}
          hasSubs={!!(getSubLabels(editingItem.id))}
          currentState={getItemState(editingItem.id)}
          subReadyCount={getSubReady(editingItem.id).length}
          onClearReady={() => {
            const id = editingItem.id;
            const q = getQuantity(id);
            setItemStateAndProgress(id, 'open', q);
            resetSubReady(id);
            setEditingItem(null);
            if (navigator.vibrate) navigator.vibrate(8);
            playSound('unpack');
          }}
        />
      )}

      {showSettings && (
        <SettingsModal
          device={device}
          updateDevice={updateDevice}
          data={data}
          updateData={updateData}
          currentAccount={currentAccount}
          onSwitchAccount={() => { setShowSettings(false); updateDevice({ accountId: null }); }}
          onClose={() => setShowSettings(false)}
          onRequestReset={() => setConfirmReset(true)}
        />
      )}

      {showDepartureMode && (
        <DepartureScreen
          items={grouped.allItems}
          states={grouped.allStates}
          accounts={data.accounts}
          responsibleFor={data.responsibleFor || {}}
          onClose={() => setShowDepartureMode(false)}
          daysUntil={daysUntilDeparture}
        />
      )}

      {undoState && (
        <UndoToast
          label={undoState.label}
          onUndo={performUndo}
          onDismiss={dismissUndo}
        />
      )}

      {showConfetti && <Confetti />}
    </div>
  );
}

function UndoToast({ label, onUndo, onDismiss }) {
  return (
    <div className="undo-toast" role="status" aria-live="polite">
      <span className="undo-toast-label">{label}</span>
      <button className="undo-toast-btn" onClick={onUndo}>Ongedaan maken</button>
      <button className="undo-toast-close" onClick={onDismiss} aria-label="Sluit melding">×</button>
    </div>
  );
}

function Modal({ title, body, buttons, onClose }) {
  return (
    <div className="modal-backdrop" onClick={onClose}>
      <div className="modal" onClick={(e) => e.stopPropagation()}>
        <h3>{title}</h3>
        <p>{body}</p>
        <div className="modal-buttons">{buttons}</div>
      </div>
    </div>
  );
}

function SubItemModal({ item, labels, emojis, showNumbers, readySet, fillPct, allReady, subResponsibles, onToggleSub, onAddSub, onEditSub, onRemoveSub, onSetSubResp, accounts, onPack, onClose }) {
  const [editingSubIdx, setEditingSubIdx] = useState(null);
  const [confirmRemoveIdx, setConfirmRemoveIdx] = useState(null);
  const [showAddPrompt, setShowAddPrompt] = useState(false);
  const [pressingIdx, setPressingIdx] = useState(null);
  const [showScrollHint, setShowScrollHint] = useState(false);
  const longPressRef = useRef(null);
  const longPressFiredRef = useRef(false);
  const gridScrollRef = useRef(null);

  // Lang indrukken op een subitem → opent bewerk-modal
  const startLongPress = (idx) => {
    longPressFiredRef.current = false;
    setPressingIdx(idx);
    if (longPressRef.current) clearTimeout(longPressRef.current);
    longPressRef.current = setTimeout(() => {
      longPressFiredRef.current = true;
      setPressingIdx(null);
      if (navigator.vibrate) navigator.vibrate(20);
      setEditingSubIdx(idx);
    }, 500);
  };
  const cancelLongPress = () => {
    setPressingIdx(null);
    if (longPressRef.current) clearTimeout(longPressRef.current);
    longPressRef.current = null;
  };

  const isMulti = !!showNumbers;

  // Scroll hint: toon indicator als grid scrollbaar is
  useEffect(() => {
    const el = gridScrollRef.current;
    if (!el) return;
    const check = () => {
      const canScroll = el.scrollHeight > el.clientHeight + 4;
      const notAtBottom = el.scrollTop + el.clientHeight < el.scrollHeight - 4;
      setShowScrollHint(canScroll && notAtBottom);
    };
    check();
    el.addEventListener('scroll', check, { passive: true });
    const ro = new ResizeObserver(check);
    ro.observe(el);
    return () => {
      el.removeEventListener('scroll', check);
      ro.disconnect();
    };
  }, [labels.length]);

  return (
    <div
      className="modal-backdrop sub-backdrop"
      onClick={onClose}
    >
      <div className="sub-modal" onClick={(e) => e.stopPropagation()}>
        <div className="sub-modal-header">
          <span className="sub-modal-icon">{item.e}</span>
          <h3 className="sub-modal-title">{item.n}</h3>
          <span className="sub-modal-counter">{readySet.size}/{labels.length}</span>
        </div>
        <p className="sub-modal-help">
          {allReady
            ? 'Alles klaargelegd. Tik hieronder om in te pakken.'
            : 'Tik om klaar te leggen. Lang ingedrukt houden om te bewerken.'}
        </p>
        <div className="sub-grid-scroll" ref={gridScrollRef}>
          <div className="sub-grid">
            {labels.map((label, idx) => {
              const isReady = readySet.has(idx);
              const subEmoji = emojis[idx];
              const subResp = (subResponsibles && subResponsibles[idx])
                ? accounts.find((a) => a.id === subResponsibles[idx])
                : null;
              const isPressing = pressingIdx === idx;
              return (
                <button
                  key={idx}
                  type="button"
                  className={`sub-tile ${isReady ? 'ready' : ''} ${isPressing ? 'pressing' : ''} ${subResp ? 'has-resp' : ''}`}
                  style={subResp ? { borderColor: subResp.color, borderWidth: '2px', borderStyle: 'solid' } : {}}
                  onClick={(e) => {
                    if (longPressFiredRef.current) {
                      longPressFiredRef.current = false;
                      return;
                    }
                    onToggleSub(idx);
                  }}
                  onTouchStart={() => startLongPress(idx)}
                  onTouchEnd={cancelLongPress}
                  onTouchMove={cancelLongPress}
                  onTouchCancel={cancelLongPress}
                  onMouseDown={() => startLongPress(idx)}
                  onMouseUp={cancelLongPress}
                  onMouseLeave={cancelLongPress}
                >
                  {isReady && fillPct < 100 && (
                    <div className="sub-tile-check">✓</div>
                  )}
                  {subResp && !isReady && (
                    <span className="sub-tile-resp-badge" style={{ background: subResp.color }} title={subResp.name}>
                      {subResp.name.charAt(0)}
                    </span>
                  )}
                  <span className="sub-tile-emoji">{subEmoji}</span>
                  <span className="sub-tile-label">{label}</span>
                  {isMulti && (
                    <span className="sub-tile-number">{idx + 1}</span>
                  )}
                </button>
              );
            })}
            <button
              type="button"
              className="sub-tile sub-tile-add"
              onClick={() => {
                if (isMulti) {
                  onAddSub(null, null);
                } else {
                  setShowAddPrompt(true);
                }
              }}
            >
              <span className="sub-tile-emoji">＋</span>
              <span className="sub-tile-label">Toevoegen</span>
            </button>
          </div>
          {showScrollHint && <div className="sub-grid-scroll-hint" aria-hidden="true" />}
        </div>
        {allReady && (
          <button
            type="button"
            className="sub-pack-btn"
            onClick={onPack}
          >
            ✓ Alles inpakken
          </button>
        )}
      </div>

      {editingSubIdx !== null && (
        <SubItemEditModal
          isMulti={isMulti}
          label={labels[editingSubIdx]}
          emoji={emojis[editingSubIdx]}
          responsibleId={(subResponsibles && subResponsibles[editingSubIdx]) || ''}
          accounts={accounts}
          onSave={(newLabel, newEmoji, newResp) => {
            if (!isMulti) onEditSub(editingSubIdx, newLabel, newEmoji);
            onSetSubResp(editingSubIdx, newResp || null);
            setEditingSubIdx(null);
          }}
          onRemove={() => {
            setConfirmRemoveIdx(editingSubIdx);
            setEditingSubIdx(null);
          }}
          onClose={() => setEditingSubIdx(null)}
        />
      )}

      {confirmRemoveIdx !== null && (
        <Modal
          title="Subitem verwijderen?"
          body={`"${labels[confirmRemoveIdx]}" wordt definitief verwijderd uit deze groep.`}
          onClose={() => setConfirmRemoveIdx(null)}
          buttons={
            <>
              <button className="btn btn-secondary" onClick={() => setConfirmRemoveIdx(null)}>Annuleer</button>
              <button className="btn btn-primary" onClick={() => {
                onRemoveSub(confirmRemoveIdx);
                setConfirmRemoveIdx(null);
              }}>Ja, verwijder</button>
            </>
          }
        />
      )}

      {showAddPrompt && (
        <SubItemAddModal
          onAdd={(label, emoji) => {
            onAddSub(label, emoji);
            setShowAddPrompt(false);
          }}
          onClose={() => setShowAddPrompt(false)}
        />
      )}
    </div>
  );
}

function SubItemEditModal({ isMulti, label, emoji, responsibleId, accounts, onSave, onRemove, onClose }) {
  const [name, setName] = useState(label || '');
  const [em, setEm] = useState(emoji || '📦');
  const [responsible, setResponsible] = useState(responsibleId || '');

  const handleSave = () => {
    if (!isMulti && !name.trim()) return;
    onSave(name.trim() || label, em.trim() || '📦', responsible);
  };

  return (
    <div className="modal-backdrop" onClick={onClose} style={{ zIndex: 1000 }}>
      <div className="modal" onClick={(e) => e.stopPropagation()}>
        <h3>Subitem bewerken</h3>
        {!isMulti && (
          <>
            <div className="input-group">
              <label>Naam</label>
              <input
                type="text"
                value={name}
                onChange={(e) => setName(e.target.value.slice(0, MAX_ITEM_NAME_LENGTH))}
                maxLength={MAX_ITEM_NAME_LENGTH}
                autoCapitalize="sentences"
                autoFocus
              />
              <span className={`char-counter ${name.length >= MAX_ITEM_NAME_LENGTH - 3 ? 'near-limit' : ''}`}>
                {name.length} / {MAX_ITEM_NAME_LENGTH}
              </span>
            </div>
            <div className="input-group">
              <label>Emoji</label>
              <input
                type="text"
                value={em}
                onChange={(e) => setEm(e.target.value)}
                placeholder="📦"
                style={{ fontSize: 22, textAlign: 'center', maxWidth: 80 }}
              />
            </div>
          </>
        )}
        {isMulti && (
          <p style={{ fontSize: 13, opacity: 0.7, marginTop: 0 }}>
            Bij identieke items kun je alleen de verantwoordelijke wijzigen of dit subitem verwijderen. Pas de naam of emoji aan via het hoofditem.
          </p>
        )}
        <div className="input-group">
          <label>Verantwoordelijke (optioneel)</label>
          <div className="responsible-picker">
            <button
              type="button"
              className={`resp-chip ${!responsible ? 'active' : ''}`}
              onClick={() => setResponsible('')}
            >
              <span>Niemand</span>
            </button>
            {accounts.map((a) => (
              <button
                key={a.id}
                type="button"
                className={`resp-chip ${responsible === a.id ? 'active' : ''}`}
                onClick={() => setResponsible(a.id)}
                style={responsible === a.id ? { borderColor: a.color, background: a.color, color: 'white' } : {}}
              >
                <span className="resp-dot" style={{ background: a.color }}>{a.name.charAt(0)}</span>
                <span>{a.name}</span>
              </button>
            ))}
          </div>
        </div>
        <div className="modal-buttons" style={{ marginBottom: 10 }}>
          <button className="btn btn-secondary" onClick={onClose}>Annuleer</button>
          <button className="btn btn-primary" onClick={handleSave}>Opslaan</button>
        </div>
        <button
          className="btn btn-danger"
          style={{ width: '100%' }}
          onClick={onRemove}
        >
          🗑 Verwijderen
        </button>
      </div>
    </div>
  );
}

function SubItemAddModal({ onAdd, onClose }) {
  const [name, setName] = useState('');
  const [emoji, setEmoji] = useState('📦');
  const [emojiTouched, setEmojiTouched] = useState(false);

  useEffect(() => {
    if (!emojiTouched && name.trim().length >= 3) {
      const suggested = suggestEmoji(name);
      if (suggested && suggested !== '📦') setEmoji(suggested);
    }
  }, [name, emojiTouched]);

  const handleAdd = () => {
    if (!name.trim()) return;
    onAdd(capitalize(name.trim()), emoji.trim() || '📦');
  };

  return (
    <div className="modal-backdrop" onClick={onClose} style={{ zIndex: 1000 }}>
      <div className="modal" onClick={(e) => e.stopPropagation()}>
        <h3>Subitem toevoegen</h3>
        <div className="input-group">
          <label>Naam</label>
          <input
            type="text"
            value={name}
            onChange={(e) => setName(e.target.value.slice(0, MAX_ITEM_NAME_LENGTH))}
            placeholder="Bijv. Pindakaas"
            autoFocus
          />
        </div>
        <div className="input-group">
          <label>Emoji</label>
          <input
            type="text"
            value={emoji}
            onChange={(e) => { setEmoji(e.target.value); setEmojiTouched(true); }}
            placeholder="📦"
            style={{ fontSize: 22, textAlign: 'center', maxWidth: 80 }}
          />
        </div>
        <div className="modal-buttons">
          <button className="btn btn-secondary" onClick={onClose}>Annuleer</button>
          <button className="btn btn-primary" onClick={handleAdd} disabled={!name.trim()}>Voeg toe</button>
        </div>
      </div>
    </div>
  );
}

function AddItemModal({ onAdd, onClose, existingCategories, prefillCategory, accountName }) {
  const [name, setName] = useState('');
  const [category, setCategory] = useState(prefillCategory || 'Eigen items');
  const [newCategory, setNewCategory] = useState('');
  const [newCategoryIcon, setNewCategoryIcon] = useState('📦');
  const [emoji, setEmoji] = useState('📦');
  const [emojiTouched, setEmojiTouched] = useState(false);
  const [isPrivate, setIsPrivate] = useState(false);

  const isNewCat = category === '__new__';

  // Auto-suggest emoji op basis van naam (alleen als je 'm niet zelf hebt aangepast)
  useEffect(() => {
    if (!emojiTouched && name.trim().length >= 3) {
      const suggested = suggestEmoji(name);
      if (suggested && suggested !== '📦') {
        setEmoji(suggested);
      }
    }
  }, [name, emojiTouched]);

  const handleAdd = () => {
    if (!name.trim()) return;
    const finalCat = isNewCat ? (newCategory.trim() || 'Eigen items') : category;
    onAdd(
      capitalize(name.trim()),
      finalCat,
      emoji.trim() || '📦',
      isPrivate,
      isNewCat ? newCategoryIcon : null
    );
  };

  const baseCats = ['Eigen items', 'Eigen documenten', 'Documenten', 'Tent en slapen', 'Koken en keuken', 'Eten en drinken', 'Schoonmaak en wassen', 'Buiten en relax', 'Stroom en techniek', 'Handdoeken', 'EHBO en gezondheid', 'Verzorging', 'Kleding', 'Elektronica', 'Vrije tijd', 'Voor vertrek', 'Voor onderweg', 'Overig'];
  const extraCats = existingCategories.filter((c) => !baseCats.includes(c));
  const allCats = [...baseCats, ...extraCats];

  return (
    <div className="modal-backdrop" onClick={onClose}>
      <div className="modal" onClick={(e) => e.stopPropagation()}>
        <h3>Eigen voorwerp toevoegen</h3>
        <p>{isPrivate ? `Privé voorwerp, alleen jij (${accountName}) ziet dit.` : 'Verschijnt op alle telefoons.'}</p>
        <div className="input-group">
          <label>Naam</label>
          <input
            type="text"
            value={name}
            onChange={(e) => setName(e.target.value.slice(0, MAX_ITEM_NAME_LENGTH))}
            placeholder="Bijv. kampeerstoel"
            autoFocus
            maxLength={MAX_ITEM_NAME_LENGTH}
            autoCapitalize="sentences"
          />
          <span className={`char-counter ${name.length >= MAX_ITEM_NAME_LENGTH - 3 ? 'near-limit' : ''}`}>
            {name.length} / {MAX_ITEM_NAME_LENGTH}
          </span>
        </div>
        <div className="input-group">
          <label>Categorie</label>
          <select value={category} onChange={(e) => setCategory(e.target.value)}>
            {allCats.map((c) => <option key={c} value={c}>{displayCategory(c)}</option>)}
            <option value="__new__">＋ Nieuwe categorie maken</option>
          </select>
        </div>
        {isNewCat && (
          <>
            <div className="input-group">
              <label>Nieuwe categorie naam</label>
              <input
                type="text"
                value={newCategory}
                onChange={(e) => setNewCategory(e.target.value.slice(0, MAX_CATEGORY_NAME_LENGTH))}
                placeholder="Bijv. Caravan"
                maxLength={MAX_CATEGORY_NAME_LENGTH}
              />
              <span className={`char-counter ${newCategory.length >= MAX_CATEGORY_NAME_LENGTH - 3 ? 'near-limit' : ''}`}>
                {newCategory.length} / {MAX_CATEGORY_NAME_LENGTH}
              </span>
            </div>
            <div className="input-group">
              <label>Categorie-icoon</label>
              <CategoryIconPicker value={newCategoryIcon} onChange={setNewCategoryIcon} />
            </div>
          </>
        )}
        <div className="input-group">
          <label>Emoji {!emojiTouched && name.length >= 3 && <span style={{ color: 'var(--leaf-deep)', fontSize: 10 }}>(auto)</span>}</label>
          <input
            type="text"
            value={emoji}
            onChange={(e) => { setEmoji(e.target.value); setEmojiTouched(true); }}
            maxLength={2}
            placeholder="📦"
          />
        </div>
        <div className="input-group">
          <label style={{ display: 'flex', alignItems: 'center', gap: 8, cursor: 'pointer', textTransform: 'none', letterSpacing: 'normal', fontSize: 13 }}>
            <input
              type="checkbox"
              checked={isPrivate}
              onChange={(e) => setIsPrivate(e.target.checked)}
              style={{ width: 18, height: 18, margin: 0 }}
            />
            <span>🔒 Privé voorwerp (alleen op deze telefoon, voor {accountName || 'jou'})</span>
          </label>
        </div>
        <div className="modal-buttons">
          <button className="btn btn-secondary" onClick={onClose}>Annuleer</button>
          <button className="btn btn-primary" onClick={handleAdd} disabled={!name.trim() || (isNewCat && !newCategory.trim())}>Toevoegen</button>
        </div>
      </div>
    </div>
  );
}

function EditItemModal({ item, quantity, responsibleFor, accounts, onSave, onDelete, onClose, existingCategories, onAddFirstSub, hasSubs, currentState, subReadyCount, onClearReady }) {
  const [name, setName] = useState(item.n);
  const [category, setCategory] = useState(item.c);
  const [newCategory, setNewCategory] = useState('');
  const [newCategoryIcon, setNewCategoryIcon] = useState('📦');
  const [emoji, setEmoji] = useState(item.e);
  const [qty, setQty] = useState(quantity || 1);
  const [responsible, setResponsible] = useState(responsibleFor || '');
  const [confirmingDelete, setConfirmingDelete] = useState(false);
  const [showAddSubPrompt, setShowAddSubPrompt] = useState(false);

  const isNewCat = category === '__new__';
  const isPrivate = checkIsPrivate(item);

  const handleSave = () => {
    if (!name.trim()) return;
    const finalCat = isNewCat ? (newCategory.trim() || 'Eigen items') : category;
    onSave(item.id, {
      n: capitalize(name.trim()),
      c: finalCat,
      e: emoji.trim() || '📦',
      quantity: Math.max(1, qty),
      responsible: responsible || null,
      newCategoryIcon: isNewCat ? newCategoryIcon : null,
    });
  };

  const baseCats = ['Eigen items', 'Eigen documenten', 'Documenten', 'Tent en slapen', 'Koken en keuken', 'Eten en drinken', 'Schoonmaak en wassen', 'Buiten en relax', 'Stroom en techniek', 'Handdoeken', 'EHBO en gezondheid', 'Verzorging', 'Kleding', 'Elektronica', 'Vrije tijd', 'Voor vertrek', 'Voor onderweg', 'Overig'];
  const extraCats = existingCategories.filter((c) => !baseCats.includes(c));
  const allCats = [...baseCats, ...extraCats];
  if (!allCats.includes(item.c)) allCats.push(item.c);

  if (confirmingDelete) {
    return (
      <div className="modal-backdrop" onClick={onClose}>
        <div className="modal" onClick={(e) => e.stopPropagation()}>
          <h3>"{item.n}" verwijderen?</h3>
          <p>Weet je het zeker?</p>
          <div className="modal-buttons">
            <button className="btn btn-secondary" onClick={() => setConfirmingDelete(false)}>Terug</button>
            <button className="btn btn-danger" onClick={() => onDelete(item.id)}>Verwijder</button>
          </div>
        </div>
      </div>
    );
  }

  return (
    <div className="modal-backdrop" onClick={onClose}>
      <div className="modal" onClick={(e) => e.stopPropagation()}>
        <h3>Voorwerp bewerken</h3>
        <div className="input-group">
          <label>Naam</label>
          <input
            type="text"
            value={name}
            onChange={(e) => setName(e.target.value.slice(0, MAX_ITEM_NAME_LENGTH))}
            maxLength={MAX_ITEM_NAME_LENGTH}
            autoCapitalize="sentences"
          />
          <span className={`char-counter ${name.length >= MAX_ITEM_NAME_LENGTH - 3 ? 'near-limit' : ''}`}>
            {name.length} / {MAX_ITEM_NAME_LENGTH}
          </span>
        </div>
        <div className="input-group">
          <label>Categorie</label>
          <select value={category} onChange={(e) => setCategory(e.target.value)}>
            {allCats.map((c) => <option key={c} value={c}>{displayCategory(c)}</option>)}
            <option value="__new__">＋ Nieuwe categorie maken</option>
          </select>
        </div>
        {isNewCat && (
          <>
            <div className="input-group">
              <label>Nieuwe categorie naam</label>
              <input
                type="text"
                value={newCategory}
                onChange={(e) => setNewCategory(e.target.value.slice(0, MAX_CATEGORY_NAME_LENGTH))}
                placeholder="Bijv. Caravan"
                maxLength={MAX_CATEGORY_NAME_LENGTH}
                autoFocus
              />
              <span className={`char-counter ${newCategory.length >= MAX_CATEGORY_NAME_LENGTH - 3 ? 'near-limit' : ''}`}>
                {newCategory.length} / {MAX_CATEGORY_NAME_LENGTH}
              </span>
            </div>
            <div className="input-group">
              <label>Categorie-icoon</label>
              <CategoryIconPicker value={newCategoryIcon} onChange={setNewCategoryIcon} />
            </div>
          </>
        )}
        <div className="input-group">
          <label>Emoji</label>
          <input type="text" value={emoji} onChange={(e) => setEmoji(e.target.value)} maxLength={2} style={{ fontSize: 22, textAlign: 'center', maxWidth: 80 }} />
        </div>
        {!isPrivate && (
          <div className="input-group">
            <label>Verantwoordelijk voor dit voorwerp</label>
            <div className="responsible-picker">
              <button
                type="button"
                className={`resp-chip ${!responsible ? 'active' : ''}`}
                onClick={() => setResponsible('')}
              >
                <span>Niemand</span>
              </button>
              {accounts.map((a) => (
                <button
                  key={a.id}
                  type="button"
                  className={`resp-chip ${responsible === a.id ? 'active' : ''}`}
                  onClick={() => setResponsible(a.id)}
                  style={responsible === a.id ? { borderColor: a.color, background: a.color, color: 'white' } : {}}
                >
                  <span className="resp-dot" style={{ background: a.color }}>{a.name.charAt(0)}</span>
                  <span>{a.name}</span>
                </button>
              ))}
            </div>
          </div>
        )}
        <div className="modal-buttons" style={{ marginBottom: 10 }}>
          <button className="btn btn-secondary" onClick={onClose}>Annuleer</button>
          <button className="btn btn-primary" onClick={handleSave} disabled={!name.trim() || (isNewCat && !newCategory.trim())}>Opslaan</button>
        </div>
        {(currentState === 'ready' || subReadyCount > 0) && onClearReady && (
          <button
            className="btn btn-secondary"
            style={{ width: '100%', marginBottom: 8 }}
            onClick={onClearReady}
          >
            ↩ Klaarleggen ongedaan maken
          </button>
        )}
        {!hasSubs && qty <= 1 && onAddFirstSub && (
          <button
            className="btn btn-secondary"
            style={{ width: '100%', marginBottom: 8 }}
            onClick={() => setShowAddSubPrompt(true)}
          >
            ＋ Subitems toevoegen
          </button>
        )}
        <button
          className="btn btn-danger"
          style={{ width: '100%' }}
          onClick={() => setConfirmingDelete(true)}
        >
          🗑 Verwijderen
        </button>
      </div>
      {showAddSubPrompt && (
        <SubItemAddModal
          onAdd={(label, em) => {
            setShowAddSubPrompt(false);
            onAddFirstSub(label, em);
          }}
          onClose={() => setShowAddSubPrompt(false)}
        />
      )}
    </div>
  );
}

function CategoryIconPicker({ value, onChange }) {
  return (
    <div className="cat-icon-picker">
      {CATEGORY_ICON_CHOICES.map((icon) => (
        <button
          key={icon}
          type="button"
          className={`cat-icon-option ${value === icon ? 'active' : ''}`}
          onClick={() => onChange(icon)}
        >
          {icon}
        </button>
      ))}
    </div>
  );
}

function AccountPicker({ accounts, onPick }) {
  return (
    <div className="account-picker">
      <h1 className="picker-title">
        Kies je <span className="picker-title-accent">profiel</span>
      </h1>
      <div className="picker-grid">
        {accounts.map((a) => (
          <button
            key={a.id}
            className="picker-card"
            onClick={() => onPick(a.id)}
            style={{
              '--card-color': a.color,
            }}
          >
            <span className="picker-card-avatar" style={{ background: a.color }}>
              {a.name.charAt(0)}
            </span>
            <span className="picker-card-name">{a.name}</span>
          </button>
        ))}
      </div>
    </div>
  );
}

function SettingsModal({ device, updateDevice, data, updateData, currentAccount, onSwitchAccount, onClose, onRequestReset }) {
  const [editingName, setEditingName] = useState(false);
  const [newName, setNewName] = useState(currentAccount?.name || '');
  const [dateInput, setDateInput] = useState(data.departureDate ? data.departureDate.slice(0, 10) : '');

  const saveName = () => {
    if (!newName.trim() || !currentAccount) return;
    updateData((prev) => ({
      ...prev,
      accounts: prev.accounts.map((a) => a.id === currentAccount.id ? { ...a, name: capitalize(newName.trim()) } : a),
    }));
    setEditingName(false);
  };

  const saveDepartureDate = () => {
    updateData((prev) => ({ ...prev, departureDate: dateInput || null }));
  };

  const NAME_MAX = 20;
  const nameNearLimit = newName.length >= NAME_MAX - 3;

  return (
    <div className="modal-backdrop" onClick={onClose}>
      <div className="modal" onClick={(e) => e.stopPropagation()} style={{ maxWidth: 420 }}>
        <h3>Instellingen</h3>

        <div className="input-group">
          <label>Account</label>
          {editingName ? (
            <div>
              <div style={{ display: 'flex', gap: 8 }}>
                <input
                  type="text"
                  value={newName}
                  onChange={(e) => setNewName(e.target.value)}
                  maxLength={NAME_MAX}
                  autoFocus
                  style={{ flex: 1 }}
                />
                <button className="btn btn-primary" style={{ flex: 'none', padding: '8px 14px' }} onClick={saveName}>OK</button>
              </div>
              <span className={`char-counter ${nameNearLimit ? 'near-limit' : ''}`}>
                {newName.length} / {NAME_MAX}
              </span>
            </div>
          ) : (
            <div style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '10px 14px', background: 'var(--bg-deep)', borderRadius: 10 }}>
              <span className="mini-avatar" style={{ background: currentAccount?.color, width: 28, height: 28, fontSize: 12 }}>
                {currentAccount?.name?.charAt(0)}
              </span>
              <span style={{ flex: 1, fontSize: 14 }}>{currentAccount?.name}</span>
              <button onClick={() => setEditingName(true)} aria-label="Naam bewerken" style={{ background: 'none', border: 'none', color: 'var(--ink-soft)', cursor: 'pointer', fontSize: 13 }}>✏️</button>
            </div>
          )}
          <button
            onClick={onSwitchAccount}
            style={{ marginTop: 8, background: 'none', border: 'none', color: 'var(--leaf-deep)', fontSize: 12, cursor: 'pointer', padding: 0, textAlign: 'left' }}
          >
            Wissel naar een ander account →
          </button>
        </div>

        <div className="input-group">
          <label>Vertrekdatum</label>
          <div style={{ display: 'flex', gap: 8 }}>
            <input
              type="date"
              value={dateInput}
              onChange={(e) => setDateInput(e.target.value)}
              style={{ flex: 1 }}
            />
            <button className="btn btn-primary" style={{ flex: 'none', padding: '8px 14px' }} onClick={saveDepartureDate}>OK</button>
          </div>
        </div>

        <div className="input-group">
          <label>Aantal kolommen ({device.columns})</label>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 6 }}>
            {[3, 4, 5].map((n) => (
              <button
                key={n}
                onClick={() => updateDevice({ columns: n })}
                style={{
                  padding: '10px 0',
                  border: '1.5px solid ' + (device.columns === n ? 'var(--leaf)' : 'var(--border-mid)'),
                  background: device.columns === n ? 'var(--leaf)' : 'var(--bg-card)',
                  color: device.columns === n ? 'white' : 'var(--ink)',
                  borderRadius: 8,
                  fontSize: 14,
                  fontWeight: 600,
                  cursor: 'pointer',
                }}
              >{n}</button>
            ))}
          </div>
        </div>

        <div className="input-group">
          <label style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', textTransform: 'none', letterSpacing: 'normal', fontSize: 14 }}>
            <span>🌙 Donkere modus</span>
            <input
              type="checkbox"
              checked={device.darkMode}
              onChange={(e) => updateDevice({ darkMode: e.target.checked })}
              style={{ width: 22, height: 22 }}
            />
          </label>
        </div>

        <button
          onClick={() => { onRequestReset(); onClose(); }}
          className="btn btn-secondary"
          style={{ width: '100%', flex: 'none', marginTop: 8 }}
        >
          ↻ Reset alle vinkjes
        </button>

        <div className="modal-buttons" style={{ marginTop: 12 }}>
          <button className="btn btn-primary" style={{ width: '100%' }} onClick={onClose}>Sluit</button>
        </div>
      </div>
    </div>
  );
}

function DepartureScreen({ items, states, accounts, responsibleFor, onClose, daysUntil }) {
  // Items die nog niet ingepakt zijn, gegroepeerd per persoon (verantwoordelijk) en categorie
  const notPacked = items.filter((it) => (states[it.id] || 'open') !== 'packed');
  const onTheDay = notPacked.filter((it) => it.c === ON_THE_DAY_CATEGORY);
  const stillToDo = notPacked.filter((it) => it.c !== ON_THE_DAY_CATEGORY);

  // Per persoon groeperen
  const byPerson = {};
  const noPerson = [];
  stillToDo.forEach((it) => {
    const r = responsibleFor[it.id];
    if (r) {
      if (!byPerson[r]) byPerson[r] = [];
      byPerson[r].push(it);
    } else {
      noPerson.push(it);
    }
  });

  const title = daysUntil === 0 ? 'Vandaag vertrek!' : daysUntil === 1 ? 'Morgen vertrek!' : daysUntil < 0 ? 'Geniet ervan!' : `Nog ${daysUntil} dagen`;

  return (
    <div className="departure-screen">
      <button className="close-btn" onClick={onClose} aria-label="Sluit">×</button>
      <h1>🚗 {title}</h1>
      <div className="subtitle">Laatste check voor je weggaat</div>

      {stillToDo.length === 0 ? (
        <div className="departure-empty">
          🎉 Niks meer te doen!<br/>
          Alle gedeelde spullen zijn ingepakt.
        </div>
      ) : (
        <>
          {accounts.map((acc) => {
            const its = byPerson[acc.id];
            if (!its || its.length === 0) return null;
            return (
              <div key={acc.id} className="departure-section">
                <h2>
                  <span className="stats-avatar" style={{ background: acc.color }}>{acc.name.charAt(0)}</span>
                  {acc.name} ({its.length})
                </h2>
                {its.map((it) => (
                  <div key={it.id} className="departure-item">
                    <span className="item-emoji">{it.e}</span>
                    <span>{it.n}</span>
                  </div>
                ))}
              </div>
            );
          })}
          {noPerson.length > 0 && (
            <div className="departure-section">
              <h2>⚠️ Nog niemand verantwoordelijk voor ({noPerson.length})</h2>
              {noPerson.map((it) => (
                <div key={it.id} className="departure-item">
                  <span className="item-emoji">{it.e}</span>
                  <span>{it.n}</span>
                </div>
              ))}
            </div>
          )}
        </>
      )}

      {onTheDay.length > 0 && (
        <div className="departure-section">
          <h2>🚗 Voor onderweg (pak op vertrekdag)</h2>
          {onTheDay.map((it) => (
            <div key={it.id} className="departure-item day-of">
              <span className="item-emoji">{it.e}</span>
              <span>{it.n}</span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function StatsCard({ stats, accounts, total, departureDate }) {
  // Sorteer accounts op aantal ingepakt
  const ranked = accounts
    .map((a) => ({ ...a, packed: stats.perPersonPacked[a.id] || 0 }))
    .filter((a) => a.packed > 0)
    .sort((a, b) => b.packed - a.packed);

  if (ranked.length === 0) return null;

  const champion = ranked[0];

  return (
    <div className="stats-card">
      <h3>🏆 De inpak-statistieken</h3>
      <div style={{ textAlign: 'center', marginBottom: 12, fontSize: 13, color: 'var(--ink-soft)' }}>
        <strong style={{ color: champion.color }}>{champion.name}</strong> heeft de meeste items ingepakt!
      </div>
      {ranked.map((a, i) => (
        <div key={a.id} className="stats-row">
          <div className="stats-person">
            <span style={{ fontSize: 14, color: 'var(--ink-soft)', minWidth: 18 }}>{i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : `${i + 1}.`}</span>
            <span className="stats-avatar" style={{ background: a.color }}>{a.name.charAt(0)}</span>
            <span>{a.name}</span>
          </div>
          <span className="stats-count">{a.packed} voorwerpen</span>
        </div>
      ))}
      <div className="stats-row" style={{ marginTop: 8 }}>
        <span style={{ color: 'var(--ink-soft)', fontSize: 13 }}>Totaal ingepakt</span>
        <span className="stats-count">{total} voorwerpen</span>
      </div>
    </div>
  );
}

function Confetti() {
  // Genereer 80 stukjes confetti met willekeurige posities, kleuren en duur
  const colors = ['#e8a838', '#d4634a', '#4a7a5c', '#2d5a3f', '#c8881a', '#f0b84a'];
  const pieces = [];
  for (let i = 0; i < 80; i++) {
    const left = Math.random() * 100;
    const delay = Math.random() * 1.5;
    const duration = 2.5 + Math.random() * 2;
    const color = colors[Math.floor(Math.random() * colors.length)];
    const width = 6 + Math.random() * 8;
    const height = 8 + Math.random() * 10;
    pieces.push(
      <div
        key={i}
        className="confetti-piece"
        style={{
          left: left + '%',
          background: color,
          width: width + 'px',
          height: height + 'px',
          animationDelay: delay + 's',
          animationDuration: duration + 's',
        }}
      />
    );
  }
  return <div className="confetti-container">{pieces}</div>;
}
